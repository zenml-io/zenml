[offload]
max_parallel = 20
test_timeout_secs = 960
max_batch_duration_secs = 320
sandbox_project_root = "/app"

[provider]
type = "default"
prepare_command = "uv run --exclude-newer \"PT72H\" @modal_sandbox.py prepare Dockerfile.ci --cached --include-cwd --sandbox-init-cmd 'cd /app && pip install --no-deps -e . -q'"
create_command = "uv run --exclude-newer \"PT72H\" @modal_sandbox.py create {image_id} --cpu 4 --memory-gb 8 --env PYTHONDONTWRITEBYTECODE=1 --env PYTHONUNBUFFERED=1 --env ZENML_DEBUG=true --env ZENML_ANALYTICS_OPT_IN=false --env AUTO_OPEN_DASHBOARD=false --env ZENML_CUSTOM_SOURCE_ROOT=/app --env MODAL_CI_SERVER_URL=${MODAL_CI_SERVER_URL} --env MODAL_CI_SERVER_USERNAME=${MODAL_CI_SERVER_USERNAME} --env MODAL_CI_SERVER_PASSWORD=${MODAL_CI_SERVER_PASSWORD} --env ZENML_CI_CHECKOUT_REF=${ZENML_CI_CHECKOUT_REF}"
exec_command = "python3 @modal_sandbox.py exec {sandbox_id} {command}"
destroy_command = "uv run --exclude-newer \"PT72H\" @modal_sandbox.py destroy {sandbox_id}"
download_command = "printf '[offload] exec_and_fetch returned no inline artifacts; falling back to download_command.\\n' >&2; python3 @modal_sandbox.py download {sandbox_id} {paths}"
exec_and_fetch_command = "python3 @modal_sandbox.py exec-and-fetch {sandbox_id} {command} --fetch {fetch}"
timeout_secs = 960

[framework]
type = "pytest"
paths = []
command = "python -m pytest -p no:pytest_postgresql"
run_args = "--no-provision --environment remote-mysql-modal -p no:randomly -p no:rerunfailures"

[groups.integration]
retry_count = 0
# These shared-state-sensitive tests are covered by a separate serial GitHub-runner job with its own Modal MySQL server.
filters = "tests/integration --ignore=tests/integration/examples --ignore=tests/integration/functional/cli -m 'not slow and not global_state' --deselect=tests/integration/functional/zen_stores/test_secrets_store.py::test_list_secrets_pagination_and_sorting --deselect=tests/integration/functional/model/test_model_version.py::TestModel::test_deletion_of_links[True]"

[report]
output_dir = ".ci/offload"
