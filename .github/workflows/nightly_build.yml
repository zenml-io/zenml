---
name: Nightly Build
on:
  workflow_dispatch:
  schedule:
    # Run this workflow every day at midnight
    - cron: 30 0 * * *
jobs:
  setup-and-test:
    uses: ./.github/workflows/unit-test.yml
    with:
      os: ubuntu-latest
      python-version: '3.11'
      git-ref: develop
    secrets: inherit
    if: github.repository == 'zenml-io/zenml'
  build-nightly-python-package:
    needs: setup-and-test
    uses: ./.github/workflows/publish_to_pypi_nightly.yml
    secrets: inherit
    if: github.repository == 'zenml-io/zenml'
  publish-nightly-python-package:
    if: github.repository == 'zenml-io/zenml'
    needs: build-nightly-python-package
    runs-on: ubuntu-latest
    environment: nightly
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download nightly Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: nightly-python-package-distributions
          path: dist
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
  wait-for-package-release:
    if: github.repository == 'zenml-io/zenml'
    runs-on: ubuntu-latest
    needs: publish-nightly-python-package
    steps:
      - name: Sleep for 4 minutes
        run: sleep 240
        shell: bash
  publish-docker-image:
    if: github.repository == 'zenml-io/zenml'
    needs: wait-for-package-release
    uses: ./.github/workflows/publish_docker_image.yml
    with:
      config_file: release-cloudbuild-nightly.yaml
      zenml_nightly: true
    secrets: inherit
