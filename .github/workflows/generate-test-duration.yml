---
name: Generate test duration file
on:
  workflow_call:
  schedule:
    - cron: 0 8 * * 1  # Run every Monday at 8 am
permissions:
  contents: write
jobs:
  generate-test-duration-file:
    name: Generate test duration file
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    env:
      ZENML_DEBUG: 1
      ZENML_ANALYTICS_OPT_IN: false
      PYTHONIOENCODING: utf-8
      UV_HTTP_TIMEOUT: 600
      PYTEST_RERUNS: 0
      # On macOS, set this to avoid Objective-C fork safety issues.
      # See: http://sealiesoftware.com/blog/archive/2017/6/5/Objective-C_and_fork_in_macOS_1013.html
      OBJC_DISABLE_INITIALIZE_FORK_SAFETY: 'YES'
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: develop
      - name: Setup environment
        uses: ./.github/actions/setup_environment
        with:
          python-version: '3.10'
          os: ubuntu-latest
      - name: Generate test duration file
        run: |
          bash scripts/test-coverage-xml.sh "" default "" "" store-durations
      - name: Upload .test_durations artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: test-durations
          path: .test_durations
          if-no-files-found: warn
      - name: Commit .test_durations if tracked and changed
        run: |
          if ! git ls-files --error-unmatch .test_durations >/dev/null 2>&1; then
            echo ".test_durations is not tracked in this branch. Skipping commit."
            exit 0
          fi
          if [ ! -f .test_durations ]; then
            echo ".test_durations was not generated. Skipping commit."
            exit 0
          fi
          git add .test_durations
          if git diff --cached --quiet -- .test_durations; then
            echo "No changes in .test_durations"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update test duration file at $(date +'%Y%m%d-%H%M%S')"
          git push origin develop
      - name: Verify Python Env unaffected
        run: |-
          zenml integration list
          uv pip list
          uv pip check || true
