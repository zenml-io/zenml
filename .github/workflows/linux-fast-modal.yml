---
name: Linux Fast CI (Modal)
on:
  workflow_call:
    inputs:
      python-version:
        description: Python version
        type: string
        required: false
        default: '3.13'
      use_modal:
        description: Run the Modal-backed fast CI path
        type: boolean
        required: false
        default: true
  workflow_dispatch:
    inputs:
      python-version:
        description: Python version
        type: string
        required: false
        default: '3.13'
      use_modal:
        description: Run the Modal-backed fast CI path
        type: boolean
        required: false
        default: true
jobs:
  modal-fast-ci:
    if: ${{ inputs.use_modal && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    # Fail fast if Modal stalls. The offload run itself has a 16-minute
    # per-test timeout (test_timeout_secs in offload.toml), and the job
    # also pays setup, image prep, and result classification time. Keep the
    # wall clock above the offload timeout so GitHub does not kill the run
    # before offload can publish its exit-code output.
    timeout-minutes: 30
    outputs:
      modal_infra_failed: ${{ steps.classify.outputs.modal_infra_failed }}
    env:
      ZENML_DEBUG: 1
      ZENML_ANALYTICS_OPT_IN: false
      PYTHONIOENCODING: utf-8
      PYTHONDONTWRITEBYTECODE: 1
      MODAL_ENVIRONMENT: ci
    defaults:
      run:
        shell: bash
    steps:
      - name: Set cache + temp dirs (/opt)
        run: |
          sudo mkdir -p /opt/uv-cache /opt/pip-cache /opt/tmp
          sudo chown -R "$(id -u)":"$(id -g)" /opt/uv-cache /opt/pip-cache /opt/tmp
          echo "UV_CACHE_DIR=/opt/uv-cache" >> "$GITHUB_ENV"
          echo "PIP_CACHE_DIR=/opt/pip-cache" >> "$GITHUB_ENV"
          echo "TMPDIR=/opt/tmp" >> "$GITHUB_ENV"
          echo "TMP=/opt/tmp" >> "$GITHUB_ENV"
          echo "TEMP=/opt/tmp" >> "$GITHUB_ENV"
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      # The Modal path executes tests remotely, but offload still performs
      # pytest collection on the GitHub runner before it schedules sandboxes.
      # Install the runner deps directly instead of going through the full
      # setup_environment composite action and its extra environment checks.
      - name: Restore runner dependency cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: |
            /opt/uv-cache
            /opt/pip-cache
          key: uv-fast-modal-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('pyproject.toml',
            'scripts/ci/modal_sandbox_requirements.txt') }}
          restore-keys: |
            uv-fast-modal-${{ runner.os }}-${{ inputs.python-version }}-
            uv-fast-modal-${{ runner.os }}-
      - name: Set up Python
        id: setup_python
        continue-on-error: true
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}
      - name: Configure git
        run: |
          git config --global user.email "info@zenml.io"
          git config --global user.name "ZenML GmbH"
      - name: Install Rust
        id: install_rust
        continue-on-error: true
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/offload
          # Cache invalidates only when the offload source pin changes,
          # not on every workflow edit. Bump the version suffix below
          # whenever the pinned offload commit changes.
          key: cargo-offload-${{ runner.os }}-455356a6aae31b15c5becc2594600513525c9e46-v1
      - name: Prepare Modal runtime
        id: prepare
        if: ${{ steps.setup_python.outcome == 'success' && steps.install_rust.outcome == 'success' }}
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${MODAL_TOKEN_ID:-}" || -z "${MODAL_TOKEN_SECRET:-}" ]]; then
            echo "::warning::Modal credentials are unavailable; falling back to standard CI."
            echo "modal_infra_failed=true" >> "$GITHUB_OUTPUT"
            echo "run_modal=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! command -v offload >/dev/null 2>&1; then
            if ! cargo install --git https://github.com/safoinme/offload.git --rev 455356a6aae31b15c5becc2594600513525c9e46; then
              echo "::warning::Unable to install pinned offload; falling back to standard CI."
              echo "modal_infra_failed=true" >> "$GITHUB_OUTPUT"
              echo "run_modal=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          if ! command -v uv >/dev/null 2>&1; then
            python -m pip install --upgrade uv
          fi
          runner_extras=".[server,templates,terraform,secrets-aws,secrets-gcp,secrets-azure,secrets-hashicorp,s3fs,gcsfs,adlfs,dev,connectors-aws,connectors-gcp,connectors-azure,azureml,sagemaker,vertex]"
          # offload.toml's high-frequency per-batch commands invoke
          # modal_sandbox.py via `python3` instead of `uv run` to skip
          # uv's PEP 723 resolve on every call (~1-2s saved per batch).
          # The runner also needs pytest and import-time test dependencies for
          # offload's local collect-only phase.
          if ! uv pip install --system -e "$runner_extras" -r scripts/ci/modal_sandbox_requirements.txt; then
            echo "::warning::Unable to install Modal runner dependencies; falling back to standard CI."
            echo "modal_infra_failed=true" >> "$GITHUB_OUTPUT"
            echo "run_modal=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! uv pip install --system "setuptools<82"; then
            echo "::warning::Unable to pin setuptools for Modal runner dependencies; falling back to standard CI."
            echo "modal_infra_failed=true" >> "$GITHUB_OUTPUT"
            echo "run_modal=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "modal_infra_failed=false" >> "$GITHUB_OUTPUT"
          echo "run_modal=true" >> "$GITHUB_OUTPUT"
      - name: Restore offload image cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: .offload-image-cache
          key: offload-image-v2-${{ runner.os }}-${{ inputs.python-version }}-${{
            hashFiles('Dockerfile.ci', '.dockerignore', 'pyproject.toml', 'scripts/install-zenml-dev.sh',
            'offload.toml', 'offload-modal-server-mysql.toml') }}
          restore-keys: |
            offload-image-v2-${{ runner.os }}-${{ inputs.python-version }}-
      - name: Restore JUnit duration cache
        id: restore_junit_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: test-results/modal-fast-ci/junit.xml
          key: offload-junit-${{ runner.os }}-${{ inputs.python-version }}
          restore-keys: |
            offload-junit-${{ runner.os }}-
      - name: Seed JUnit durations from baseline if cache missed
        # The offload scheduler uses junit.xml to drive LPT bin-packing.
        # Without historical durations it falls back to 1s/test, which packs
        # the heavy test_model_version* cluster into a single batch and
        # produces a ~410s tail. `ci/baseline-junit.xml` is a trimmed
        # duration map from a known-good run; seed it whenever the actions
        # cache missed so every fresh branch / dep-bump starts warm.
        if: ${{ steps.prepare.outputs.run_modal == 'true' && steps.restore_junit_cache.outputs.cache-hit
          != 'true' && hashFiles('ci/baseline-junit.xml') != '' }}
        run: |
          set -euo pipefail
          mkdir -p test-results/modal-fast-ci
          cp ci/baseline-junit.xml test-results/modal-fast-ci/junit.xml
          echo "::notice::Seeded offload scheduler with ci/baseline-junit.xml ($(wc -c < test-results/modal-fast-ci/junit.xml) bytes)"
      - name: Run tests via offload
        id: run
        if: ${{ steps.prepare.outputs.run_modal == 'true' }}
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        # `-v` switches offload's tracing subscriber from WARN to
        # INFO so sandbox creation, per-batch [BATCH START] /
        # [BATCH COMPLETE fused=...] lines, and the orchestrator
        # summary all stream into the CI log. `stdbuf -oL` forces
        # line-buffered stdout on both offload and grep so that
        # output is visible live instead of appearing in one
        # buffered dump at the end of the step (the previous
        # `grep` without `--line-buffered` block-buffered because
        # stdout wasn't a tty).
        run: |
          set -euo pipefail
          run_started_at="$(date +%s)"
          offload_log="test-results/modal-fast-ci/offload.log"
          junit_file="test-results/modal-fast-ci/junit.xml"
          mkdir -p "$(dirname "$offload_log")"
          if [[ -f "$junit_file" ]]; then
            touch -d "2000-01-01 00:00:00 UTC" "$junit_file"
          fi
          echo "run_started_at=$run_started_at" >> "$GITHUB_OUTPUT"
          # max_parallel lives in offload.toml; don't duplicate it here.
          set +e
          stdbuf -oL -eL offload -v run 2>&1 \
            | tee "$offload_log" \
            | stdbuf -oL grep -v 'No historical duration for test'
          exit_code="${PIPESTATUS[0]}"
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          modal_infra_failed=false
          is_offload_prepare_failure() {
            if [[ ! -f "$offload_log" ]]; then
              return 1
            fi
            grep -Eq \
              'Failed to prepare Default provider|Default prepare command failed|failed to run builder command|modal\.exception\.RemoteError|Image build .* failed|Failed to create sandboxes|Failed to execute command: Create command failed|Failed to spawn: .*modal_sandbox|Failed to discover tests|pytest --collect-only failed|No module named pytest' \
              "$offload_log"
          }
          if [[ "$exit_code" != "0" && "$exit_code" != "2" ]]; then
            if [[ ! -f "$junit_file" || "$(stat -c %Y "$junit_file")" -lt "$run_started_at" ]]; then
              if is_offload_prepare_failure; then
                echo "::warning::offload failed before producing a fresh JUnit XML; falling back to standard CI."
                modal_infra_failed=true
              fi
            fi
          fi
          echo "modal_infra_failed=$modal_infra_failed" >> "$GITHUB_OUTPUT"
          if [[ "$modal_infra_failed" == "true" ]]; then
            exit 0
          fi
          # offload exit-code contract (see offload/src/orchestrator.rs):
          #   0 = all tests passed
          #   1 = one or more tests failed, or expected tests were never run
          #   2 = all tests passed, but one or more were flaky (pass on retry)
          # None of these signal infrastructure failure: that's detected
          # separately via `is_offload_prepare_failure` on the offload log and
          # via the fresh-junit check below. Both 0 and 2 mean the Modal run
          # produced a trustworthy result and we should NOT fall back to the
          # standard CI path.
          exit "$exit_code"
      - name: Classify Modal result
        id: classify
        if: always()
        run: |
          set -euo pipefail
          junit_file="test-results/modal-fast-ci/junit.xml"
          offload_log="test-results/modal-fast-ci/offload.log"
          modal_infra_failed=false
          test_failed=false
          junit_cache_safe=false
          is_offload_prepare_failure() {
            if [[ ! -f "$offload_log" ]]; then
              return 1
            fi
            grep -Eq \
              'Failed to prepare Default provider|Default prepare command failed|failed to run builder command|modal\.exception\.RemoteError|Image build .* failed|Failed to create sandboxes|Failed to execute command: Create command failed|Failed to spawn: .*modal_sandbox|Failed to discover tests|pytest --collect-only failed|No module named pytest' \
              "$offload_log"
          }
          if [[ "${{ steps.setup_python.outcome }}" != "success" ]]; then
            echo "::warning::Python setup failed; falling back to standard CI."
            modal_infra_failed=true
          fi
          if [[ "${{ steps.install_rust.outcome }}" != "success" ]]; then
            echo "::warning::Install Rust failed; falling back to standard CI."
            modal_infra_failed=true
          fi
          if [[ "${{ steps.prepare.outcome }}" == "failure" ]]; then
            echo "::warning::Modal runtime preparation failed; falling back to standard CI."
            modal_infra_failed=true
          fi
          if [[ "${{ steps.prepare.outputs.modal_infra_failed }}" == "true" ]]; then
            modal_infra_failed=true
          fi
          if [[ "${{ steps.run.outputs.modal_infra_failed }}" == "true" ]]; then
            modal_infra_failed=true
          fi
          if [[ "$modal_infra_failed" != "true" && "${{ steps.prepare.outputs.run_modal }}" == "true" ]]; then
            exit_code="${{ steps.run.outputs.exit_code }}"
            run_started_at="${{ steps.run.outputs.run_started_at }}"
            if [[ -z "$exit_code" ]]; then
              echo "::error::offload did not report an exit code."
              test_failed=true
            elif [[ ! -f "$junit_file" ]]; then
              if is_offload_prepare_failure; then
                echo "::warning::offload failed before executing tests; falling back to standard CI."
                modal_infra_failed=true
              else
                echo "::error::offload exited with $exit_code but no JUnit XML was produced."
                test_failed=true
              fi
            elif [[ -z "$run_started_at" || "$(stat -c %Y "$junit_file")" -lt "$run_started_at" ]]; then
              if is_offload_prepare_failure; then
                echo "::warning::offload failed during environment preparation; falling back to standard CI."
                modal_infra_failed=true
              else
                echo "::error::offload did not write a fresh JUnit XML for this run."
                test_failed=true
              fi
            elif ! summary_output="$(python3 scripts/ci/print_junit_summary.py "$junit_file" 2>&1)"; then
              echo "::error::Failed to parse JUnit XML at $junit_file."
              printf '%s\n' "$summary_output"
              test_failed=true
            else
              printf '%s\n' "$summary_output"
              # Exit 0 = clean pass; exit 2 = pass with flakes (retry succeeded).
              # Both indicate a trustworthy, complete run and are safe to
              # cache the JUnit file from. Exit 1 (or anything else) means
              # real failures or missing tests.
              if [[ "$exit_code" == "0" || "$exit_code" == "2" ]]; then
                junit_cache_safe=true
                if [[ "$exit_code" == "2" ]]; then
                  echo "::notice::offload reported flaky tests (passed on retry); treating run as successful."
                fi
                if [[ "$summary_output" == *"Failed tests:"* ]]; then
                  echo "::error::offload reported success, but the JUnit XML still contains failures."
                  junit_cache_safe=false
                  test_failed=true
                fi
              else
                test_failed=true
                if [[ "$summary_output" != *"Failed tests:"* ]]; then
                  echo "::error::offload exited with $exit_code but the fresh JUnit XML contains no failures."
                fi
              fi
            fi
          fi
          echo "modal_infra_failed=$modal_infra_failed" >> "$GITHUB_OUTPUT"
          echo "test_failed=$test_failed" >> "$GITHUB_OUTPUT"
          echo "junit_cache_safe=$junit_cache_safe" >> "$GITHUB_OUTPUT"
      - name: Save offload image cache
        if: ${{ always() && steps.prepare.outputs.run_modal == 'true' }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: .offload-image-cache
          key: offload-image-v2-${{ runner.os }}-${{ inputs.python-version }}-${{
            hashFiles('Dockerfile.ci', '.dockerignore', 'pyproject.toml', 'scripts/install-zenml-dev.sh',
            'offload.toml', 'offload-modal-server-mysql.toml') }}
      - name: Save JUnit duration cache
        if: ${{ always() && steps.classify.outputs.junit_cache_safe == 'true' }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: test-results/modal-fast-ci/junit.xml
          key: offload-junit-${{ runner.os }}-${{ inputs.python-version }}-${{ github.run_id
            }}
      - name: Upload fast-CI artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: modal-fast-ci
          path: test-results/modal-fast-ci/**
          if-no-files-found: warn
      - name: Exit with classified status
        if: always()
        run: |
          if [[ "${{ steps.classify.outputs.test_failed }}" == "true" ]]; then
            exit 1
          fi
  # Fallback path when Modal infra is unavailable (missing credentials,
  # offload install failure, sandbox prep failure). These inherit the
  # default rerun policy from unit-test.yml / integration-test-fast.yml
  # so genuine flakes in the fallback path still get retried.
  fallback-unit-test:
    needs: modal-fast-ci
    if: ${{ needs.modal-fast-ci.outputs.modal_infra_failed == 'true' }}
    uses: ./.github/workflows/unit-test.yml
    with:
      os: ubuntu-latest
      python-version: ${{ inputs.python-version }}
    secrets: inherit
  fallback-integration-test:
    needs: [modal-fast-ci, fallback-unit-test]
    if: ${{ needs.modal-fast-ci.outputs.modal_infra_failed == 'true' && needs.fallback-unit-test.result
      == 'success' }}
    uses: ./.github/workflows/integration-test-fast.yml
    with:
      os: ubuntu-latest
      python-version: ${{ inputs.python-version }}
      test_environment: default
    secrets: inherit
  # Non-Modal path for fork PRs (no Modal secrets) — use the standard
  # unit/integration workflows directly.
  non-modal-unit-test:
    if: ${{ ! inputs.use_modal }}
    uses: ./.github/workflows/unit-test.yml
    with:
      os: ubuntu-latest
      python-version: ${{ inputs.python-version }}
    secrets: inherit
  non-modal-integration-test:
    needs: non-modal-unit-test
    if: ${{ ! inputs.use_modal && needs.non-modal-unit-test.result == 'success' }}
    uses: ./.github/workflows/integration-test-fast.yml
    with:
      os: ubuntu-latest
      python-version: ${{ inputs.python-version }}
      test_environment: default
    secrets: inherit
