---
name: Linux Fast CI (Modal)
on:
  workflow_call:
    inputs:
      python-version:
        description: Python version
        type: string
        required: false
        default: '3.13'
      use_modal:
        description: Run the Modal-backed fast CI path
        type: boolean
        required: false
        default: true
  workflow_dispatch:
    inputs:
      python-version:
        description: Python version
        type: string
        required: false
        default: '3.13'
      use_modal:
        description: Run the Modal-backed fast CI path
        type: boolean
        required: false
        default: true
jobs:
  modal-fast-ci:
    if: ${{ inputs.use_modal }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      modal_infra_failed: ${{ steps.run.outputs.modal_infra_failed }}
    env:
      ZENML_DEBUG: 1
      ZENML_ANALYTICS_OPT_IN: false
      PYTHONIOENCODING: utf-8
      PYTHONDONTWRITEBYTECODE: 1
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Setup environment
        uses: ./.github/actions/setup_environment
        with:
          cache_version: ${{ inputs.python-version }}
          python-version: ${{ inputs.python-version }}
          os: ubuntu-latest
          install_integrations: 'no'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/offload
          key: cargo-offload-${{ runner.os }}-${{ hashFiles('.github/workflows/linux-fast-modal.yml') }}
      - name: Install offload
        run: command -v offload || cargo install --git https://github.com/safoinme/offload.git --branch feat/memory-gb-option
      - name: Restore offload image cache
        uses: actions/cache/restore@v4
        with:
          path: .offload-image-cache
          key: offload-image-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('Dockerfile.ci',
            'pyproject.toml', 'scripts/install-zenml-dev.sh') }}
      - name: Restore JUnit duration cache
        uses: actions/cache/restore@v4
        with:
          path: test-results/modal-fast-ci/junit.xml
          key: offload-junit-${{ runner.os }}-${{ inputs.python-version }}
          restore-keys: |
            offload-junit-${{ runner.os }}-
      - name: Run tests via offload
        id: run
        continue-on-error: true
        run: |
          set +e
          offload run --parallel 40
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          # offload doesn't have a separate infra-failure code;
          # treat any non-zero as test failure for now
          echo "modal_infra_failed=false" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Combine coverage
        if: always()
        run: python scripts/ci/combine_coverage.py
      - name: Save offload image cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .offload-image-cache
          key: offload-image-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('Dockerfile.ci',
            'pyproject.toml', 'scripts/install-zenml-dev.sh') }}
      - name: Save JUnit duration cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: test-results/modal-fast-ci/junit.xml
          key: offload-junit-${{ runner.os }}-${{ inputs.python-version }}
      - name: Fail on test failure
        if: ${{ steps.run.outputs.exit_code != '0' && steps.run.outputs.exit_code != '2' }}
        run: exit 1
      - name: Upload fast-CI artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: modal-fast-ci
          path: |
            test-results/modal-fast-ci/**
            coverage.xml
          if-no-files-found: warn
  fallback-unit-test:
    needs: modal-fast-ci
    if: ${{ needs.modal-fast-ci.outputs.modal_infra_failed == 'true' }}
    uses: ./.github/workflows/unit-test.yml
    with:
      os: ubuntu-latest
      python-version: ${{ inputs.python-version }}
      reruns: 0
    secrets: inherit
  fallback-integration-test:
    needs: [modal-fast-ci, fallback-unit-test]
    if: ${{ needs.modal-fast-ci.outputs.modal_infra_failed == 'true' && needs.fallback-unit-test.result
      == 'success' }}
    uses: ./.github/workflows/integration-test-fast.yml
    with:
      os: ubuntu-latest
      python-version: ${{ inputs.python-version }}
      test_environment: default
      reruns: 0
    secrets: inherit
  non-modal-unit-test:
    if: ${{ ! inputs.use_modal }}
    uses: ./.github/workflows/unit-test.yml
    with:
      os: ubuntu-latest
      python-version: ${{ inputs.python-version }}
      reruns: 0
    secrets: inherit
  non-modal-integration-test:
    needs: non-modal-unit-test
    if: ${{ ! inputs.use_modal && needs.non-modal-unit-test.result == 'success' }}
    uses: ./.github/workflows/integration-test-fast.yml
    with:
      os: ubuntu-latest
      python-version: ${{ inputs.python-version }}
      test_environment: default
      reruns: 0
    secrets: inherit
