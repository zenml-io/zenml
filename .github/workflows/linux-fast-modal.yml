---
name: Linux Fast CI (Modal)
on:
  workflow_call:
    inputs:
      python-version:
        description: Python version
        type: string
        required: false
        default: '3.13'
      use_modal:
        description: Run the Modal-backed fast CI path
        type: boolean
        required: false
        default: true
  workflow_dispatch:
    inputs:
      python-version:
        description: Python version
        type: string
        required: false
        default: '3.13'
      use_modal:
        description: Run the Modal-backed fast CI path
        type: boolean
        required: false
        default: true
jobs:
  modal-fast-ci:
    if: ${{ inputs.use_modal }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      modal_infra_failed: ${{ steps.run.outputs.modal_infra_failed }}
    env:
      ZENML_DEBUG: 1
      ZENML_ANALYTICS_OPT_IN: false
      PYTHONIOENCODING: utf-8
      PYTHONDONTWRITEBYTECODE: 1
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Set uv cache + temp dirs (/opt)
        run: |
          sudo mkdir -p /opt/uv-cache /opt/tmp
          sudo chown -R "$(id -u)":"$(id -g)" /opt/uv-cache /opt/tmp
          echo "UV_CACHE_DIR=/opt/uv-cache" >> "$GITHUB_ENV"
          echo "TMPDIR=/opt/tmp" >> "$GITHUB_ENV"
          echo "TMP=/opt/tmp" >> "$GITHUB_ENV"
          echo "TEMP=/opt/tmp" >> "$GITHUB_ENV"
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      # Cache the uv resolver/wheel cache so install-zenml-dev.sh
      # restores in seconds instead of running ~3 minutes of fresh
      # downloads + builds for the full server+secrets+connectors
      # extras tree. Key tracks the inputs that affect the resolved
      # dep set; restore-keys lets stale caches still pre-warm pip
      # downloads on dep bumps.
      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: /opt/uv-cache
          key: uv-fast-modal-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('pyproject.toml',
            'scripts/install-zenml-dev.sh', 'scripts/install_dev_requirements.py')
            }}
          restore-keys: |
            uv-fast-modal-${{ runner.os }}-${{ inputs.python-version }}-
            uv-fast-modal-${{ runner.os }}-
      - name: Setup environment
        uses: ./.github/actions/setup_environment
        with:
          cache_version: ${{ inputs.python-version }}
          python-version: ${{ inputs.python-version }}
          os: ubuntu-latest
          install_integrations: 'no'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/offload
          # Cache invalidates only when the offload source pin changes,
          # not on every workflow edit. Bump the version suffix below
          # whenever a new offload commit needs to be picked up.
          key: cargo-offload-${{ runner.os }}-feat-max-batch-duration-v2
      - name: Install offload
        run: command -v offload || cargo install --git https://github.com/safoinme/offload.git
          --branch feat/max-batch-duration
      # offload.toml's high-frequency per-batch commands invoke
      # modal_sandbox.py via `python3` instead of `uv run` to skip
      # uv's PEP 723 resolve on every call (~1-2s saved per batch).
      # That requires `modal`, `click`, and `dockerfile-parse` to
      # already be importable from the runner's system python.
      # Pinned to match modal_sandbox.py's inline metadata header.
      - name: Install modal_sandbox.py deps
        run: uv pip install --system "modal==1.4.1" "click>=8.0" "dockerfile-parse>=2.0.0"
      - name: Restore offload image cache
        uses: actions/cache/restore@v4
        with:
          path: .offload-image-cache
          key: offload-image-v2-${{ runner.os }}-${{ inputs.python-version }}-${{
            hashFiles('Dockerfile.ci', 'pyproject.toml', 'scripts/install-zenml-dev.sh')
            }}
      - name: Restore JUnit duration cache
        uses: actions/cache/restore@v4
        with:
          path: test-results/modal-fast-ci/junit.xml
          key: offload-junit-${{ runner.os }}-${{ inputs.python-version }}
          restore-keys: |
            offload-junit-${{ runner.os }}-
      - name: Run tests via offload
        id: run
        # `-v` switches offload's tracing subscriber from WARN to
        # INFO so sandbox creation, per-batch [BATCH START] /
        # [BATCH COMPLETE fused=...] lines, and the orchestrator
        # summary all stream into the CI log. `stdbuf -oL` forces
        # line-buffered stdout on both offload and grep so that
        # output is visible live instead of appearing in one
        # buffered dump at the end of the step (the previous
        # `grep` without `--line-buffered` block-buffered because
        # stdout wasn't a tty).
        run: |
          set +e
          stdbuf -oL -eL offload -v run --parallel 40 2>&1 \
            | stdbuf -oL grep -v 'No historical duration for test'
          exit_code="${PIPESTATUS[0]}"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" = "2" ]; then
            echo "modal_infra_failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "modal_infra_failed=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0
      - name: Save caches
        if: always()
        run: echo "Caches saved in post-run steps below"
      - name: Save offload image cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .offload-image-cache
          key: offload-image-v2-${{ runner.os }}-${{ inputs.python-version }}-${{
            hashFiles('Dockerfile.ci', 'pyproject.toml', 'scripts/install-zenml-dev.sh')
            }}
      - name: Save JUnit duration cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: test-results/modal-fast-ci/junit.xml
          key: offload-junit-${{ runner.os }}-${{ inputs.python-version }}-${{ github.run_id
            }}
      - name: Upload fast-CI artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: modal-fast-ci
          path: test-results/modal-fast-ci/**
          if-no-files-found: warn
      - name: Print test failures and exit
        if: ${{ steps.run.outputs.exit_code != '0' && steps.run.outputs.exit_code != '2' }}
        run: |
          python -c "
          import xml.etree.ElementTree as ET, glob, sys
          files = glob.glob('test-results/**/junit.xml', recursive=True)
          if not files:
              print('No JUnit XML found'); sys.exit(1)
          failures = []
          for f in files:
              for tc in ET.parse(f).iter('testcase'):
                  for fail in tc.findall('failure'):
                      failures.append((tc.get('classname',''), tc.get('name',''), fail.text or ''))
                  for err in tc.findall('error'):
                      failures.append((tc.get('classname',''), tc.get('name',''), err.text or ''))
          if not failures:
              print('All tests passed!'); sys.exit(0)
          print(f'\n::error::{len(failures)} test failure(s):\n')
          for cls, name, msg in failures:
              print(f'FAILED {cls}::{name}')
              for line in msg.strip().splitlines()[-20:]:
                  print(f'  {line}')
              print()
          sys.exit(1)
          "
  fallback-unit-test:
    needs: modal-fast-ci
    if: ${{ needs.modal-fast-ci.outputs.modal_infra_failed == 'true' }}
    uses: ./.github/workflows/unit-test.yml
    with:
      os: ubuntu-latest
      python-version: ${{ inputs.python-version }}
      reruns: 0
    secrets: inherit
  fallback-integration-test:
    needs: [modal-fast-ci, fallback-unit-test]
    if: ${{ needs.modal-fast-ci.outputs.modal_infra_failed == 'true' && needs.fallback-unit-test.result
      == 'success' }}
    uses: ./.github/workflows/integration-test-fast.yml
    with:
      os: ubuntu-latest
      python-version: ${{ inputs.python-version }}
      test_environment: default
      reruns: 0
    secrets: inherit
  non-modal-unit-test:
    if: ${{ ! inputs.use_modal }}
    uses: ./.github/workflows/unit-test.yml
    with:
      os: ubuntu-latest
      python-version: ${{ inputs.python-version }}
      reruns: 0
    secrets: inherit
  non-modal-integration-test:
    needs: non-modal-unit-test
    if: ${{ ! inputs.use_modal && needs.non-modal-unit-test.result == 'success' }}
    uses: ./.github/workflows/integration-test-fast.yml
    with:
      os: ubuntu-latest
      python-version: ${{ inputs.python-version }}
      test_environment: default
      reruns: 0
    secrets: inherit
