---
# Merge-queue gate. Runs heavier checks that are too expensive for every PR
# but must pass before any commit enters develop:
#   - random database migration tests (MySQL, MariaDB, SQLite) with a run-id
#     seed so we hit a different random migration path on every queue entry
#   - Python 3.13 linting and unit tests on all three platforms
#   - docker-server-docker-orchestrator-mysql integration (moved from ci-fast
#     because it's too slow for the PR tier)
#   - base-package smoke tests
#   - remote-mysql-modal offload integration lane (PR 2)
#
# Kill-switch decision (gap 3):
#   The source branch had a `modal-enabled` guard job that hard-failed the
#   ENTIRE merge queue when ZENML_CI_MODAL_DISABLED=true.  This is NOT ported
#   as written.  Instead the offload lane carries the kill-switch condition
#   directly (see remote-mysql-modal-offload below), and Modal-independent jobs
#   (migrations, lint, unit tests) are NEVER gated on it.
#
#   Rationale: hard-blocking migrations and lint when Modal is down defeats the
#   purpose of the merge queue (catching correctness regressions).  Instead:
#   - If Modal is enabled: remote-mysql-modal-offload runs and is required.
#   - If Modal is disabled (kill switch): remote-mysql-modal-offload is skipped
#     and the docker-orchestrator-mysql runner lane (which is always required)
#     provides the database integration coverage.  The rollup uses
#     allowed-skips for the offload lane so the queue can still proceed.
#   This means the modal-mysql coverage is always provided by at least one
#   mechanism, with no hard queue block when the kill switch fires.
#
# Two timing systems (gap 5):
#   .test_durations feeds pytest-split sharding for the runner lanes here.
#   offload-history.jsonl feeds offload LPT scheduling in the offload lane.
#   Both are intentional; neither must be silently removed.
name: ci-medium
on:
  merge_group:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  sqlite-db-migration-testing-random:
    runs-on: ubuntu-latest
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
      RANDOM_MIGRATION_COUNT: 5
      RANDOM_MIGRATION_SEED: ${{ github.run_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
      - name: Test migrations across versions
        run: bash scripts/test-migrations.sh sqlite random
  mysql-db-migration-testing-random:
    runs-on: ubuntu-latest
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
      RANDOM_MIGRATION_COUNT: 5
      RANDOM_MIGRATION_SEED: ${{ github.run_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Test migrations across versions
        run: bash scripts/test-migrations.sh mysql random
  mariadb-db-migration-testing-random:
    runs-on: ubuntu-latest
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
      RANDOM_MIGRATION_COUNT: 5
      RANDOM_MIGRATION_SEED: ${{ github.run_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Test migrations across versions
        run: bash scripts/test-migrations.sh mariadb random
  linting:
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.13']
      fail-fast: false
    uses: ./.github/workflows/linting.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
    secrets: inherit
  unit-test:
    needs: [linting]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.13'
          - os: macos-latest
            python-version: '3.13'
          - os: windows-latest
            python-version: '3.13'
      fail-fast: false
    uses: ./.github/workflows/unit-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
    secrets: inherit
  docker-orchestrator-mysql-integration-test:
    needs: [linting]
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.13']
        test_environment: [docker-server-docker-orchestrator-mysql]
      fail-fast: false
    uses: ./.github/workflows/integration-test-fast.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      test_environment: ${{ matrix.test_environment }}
      ci_tier: medium
    secrets: inherit
  base-package-functionality:
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.13']
      fail-fast: false
    uses: ./.github/workflows/base-package-functionality.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
    secrets: inherit
  # ── Remote-MySQL offload lane ─────────────────────────────────────────────
  # Runs the integration test suite against a Modal-hosted MySQL server.
  # The sandbox lifecycle (start + stop) is managed inside offload-tests.yml;
  # the old start-sandbox / integration-test / stop-sandbox trio is NOT ported.
  #
  # Kill switch: if ZENML_CI_MODAL_DISABLED=true, this job is skipped and
  # docker-orchestrator-mysql-integration-test (always required) provides the
  # database integration coverage.  The rollup uses allowed-skips for this
  # lane so the queue proceeds on the runner path when Modal is disabled.
  remote-mysql-modal-offload:
    if: vars.ZENML_CI_MODAL_DISABLED != 'true'
    uses: ./.github/workflows/offload-tests.yml
    with:
      suite: integration-mysql
      environment: remote-mysql-modal
      parallel: 20
    secrets: inherit
  ci-medium-required:
    # alls-green reports a single green/red status for the rollup.
    #
    # allowed-skips rationale:
    #   remote-mysql-modal-offload — skipped when ZENML_CI_MODAL_DISABLED=true;
    #     docker-orchestrator-mysql-integration-test provides the coverage.
    runs-on: ubuntu-latest
    needs:
      - sqlite-db-migration-testing-random
      - mysql-db-migration-testing-random
      - mariadb-db-migration-testing-random
      - linting
      - unit-test
      - docker-orchestrator-mysql-integration-test
      - base-package-functionality
      - remote-mysql-modal-offload
    if: always()
    steps:
      - name: Check all required medium-CI jobs passed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # v1.2.2
        with:
          allowed-skips: remote-mysql-modal-offload
          jobs: ${{ toJSON(needs) }}
