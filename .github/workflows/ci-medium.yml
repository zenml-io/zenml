---
# Merge-queue gate. Runs heavier checks that are too expensive for every PR
# but must pass before any commit enters develop:
#   - random database migration tests (MySQL, MariaDB, SQLite) with a run-id
#     seed so we hit a different random migration path on every queue entry
#   - Python 3.13 linting and unit tests on all three platforms
#   - docker-server-docker-orchestrator-mysql integration (moved from ci-fast
#     because it's too slow for the PR tier)
#   - base-package smoke tests
#
# The remote-mysql sandbox lane is added in PR 2 once the execution backend
# lands.  The source branch's kill-switch guard job is NOT ported here — it
# belongs to the PR 2 execution-backend decision (gap 3 in the implementation
# notes).  The recommendation is to substitute the docker-server-mysql runner
# lane rather than hard-blocking the queue when the kill switch fires.
name: ci-medium
on:
  merge_group:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  sqlite-db-migration-testing-random:
    runs-on: ubuntu-latest
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
      RANDOM_MIGRATION_COUNT: 5
      RANDOM_MIGRATION_SEED: ${{ github.run_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
      - name: Test migrations across versions
        run: bash scripts/test-migrations.sh sqlite random
  mysql-db-migration-testing-random:
    runs-on: ubuntu-latest
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
      RANDOM_MIGRATION_COUNT: 5
      RANDOM_MIGRATION_SEED: ${{ github.run_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Test migrations across versions
        run: bash scripts/test-migrations.sh mysql random
  mariadb-db-migration-testing-random:
    runs-on: ubuntu-latest
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
      RANDOM_MIGRATION_COUNT: 5
      RANDOM_MIGRATION_SEED: ${{ github.run_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Test migrations across versions
        run: bash scripts/test-migrations.sh mariadb random
  linting:
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.13']
      fail-fast: false
    uses: ./.github/workflows/linting.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
    secrets: inherit
  unit-test:
    needs: [linting]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.13'
          - os: macos-latest
            python-version: '3.13'
          - os: windows-latest
            python-version: '3.13'
      fail-fast: false
    uses: ./.github/workflows/unit-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
    secrets: inherit
  docker-orchestrator-mysql-integration-test:
    needs: [linting]
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.13']
        test_environment: [docker-server-docker-orchestrator-mysql]
      fail-fast: false
    uses: ./.github/workflows/integration-test-fast.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      test_environment: ${{ matrix.test_environment }}
      ci_tier: medium
    secrets: inherit
  base-package-functionality:
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.13']
      fail-fast: false
    uses: ./.github/workflows/base-package-functionality.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
    secrets: inherit
  ci-medium-required:
    # alls-green reports a single green/red status for the rollup.
    # PR 2 will extend this `needs` list with the sandbox integration lane.
    runs-on: ubuntu-latest
    needs:
      - sqlite-db-migration-testing-random
      - mysql-db-migration-testing-random
      - mariadb-db-migration-testing-random
      - linting
      - unit-test
      - docker-orchestrator-mysql-integration-test
      - base-package-functionality
    if: always()
    steps:
      - name: Check all required medium-CI jobs passed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
