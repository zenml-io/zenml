---
name: Tests (Offload on Modal)
on:
  workflow_call:
    inputs:
      python-version:
        description: Python version for Modal sandbox
        type: string
        required: false
        default: '3.12'
  workflow_dispatch:
    inputs:
      python-version:
        description: Python version for Modal sandbox
        type: string
        required: false
        default: '3.12'
jobs:
  offload-test:
    name: offload-test (py${{ inputs.python-version }})
    runs-on: ubuntu-latest
    env:
      ZENML_DEBUG: 1
      ZENML_ANALYTICS_OPT_IN: false
      PYTHONIOENCODING: utf-8
      UV_HTTP_TIMEOUT: 600
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MODAL_ENVIRONMENT: ci
    if: ${{ ! startsWith(github.event.head_commit.message, 'GitBook:') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install ZenML dev (lightweight, for test discovery)
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"
      - name: Install offload and Modal SDK
        run: |
          cargo install offload
          uv pip install --system modal
      - name: Set Python version in Dockerfile
        if: inputs.python-version != '3.12'
        run: sed -i "s/python:3.12/python:${{ inputs.python-version }}/" docker/offload-test.Dockerfile
      - name: Restore offload image cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .offload-image-cache
          key: offload-modal-py${{ inputs.python-version }}-${{ hashFiles('docker/offload-test.Dockerfile',
            'pyproject.toml', 'src/zenml/integrations/*/__init__.py') }}
      - name: Replace .dockerignore for offload
        run: |
          cp .dockerignore .dockerignore.bak
          cp .offloadignore .dockerignore
      - name: Run tests on Modal via offload
        run: bash scripts/test-offload.sh
      - name: Restore .dockerignore
        if: always()
        run: mv .dockerignore.bak .dockerignore
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: offload-test-results-py${{ inputs.python-version }}
          path: test-results/
          retention-days: 14
