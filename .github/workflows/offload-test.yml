---
name: Tests (Offload on Modal)
on:
  workflow_call:
    inputs:
      python-version:
        description: Python version for Modal sandbox
        type: string
        required: false
        default: '3.12'
  workflow_dispatch:
    inputs:
      python-version:
        description: Python version for Modal sandbox
        type: string
        required: false
        default: '3.12'
jobs:
  offload-test:
    name: offload-test (py${{ inputs.python-version }})
    runs-on: ubuntu-latest
    env:
      ZENML_DEBUG: 1
      ZENML_ANALYTICS_OPT_IN: false
      PYTHONIOENCODING: utf-8
      UV_HTTP_TIMEOUT: 600
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MODAL_ENVIRONMENT: ci
    if: ${{ ! startsWith(github.event.head_commit.message, 'GitBook:') }}
    steps:
      - name: Free disk space (Ubuntu)
        run: |
          set -euxo pipefail
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
      - name: Set uv cache + temp dirs (/opt)
        run: |
          sudo mkdir -p /opt/uv-cache /opt/tmp
          sudo chown -R "$(id -u)":"$(id -g)" /opt/uv-cache /opt/tmp
          echo "UV_CACHE_DIR=/opt/uv-cache" >> "$GITHUB_ENV"
          echo "TMPDIR=/opt/tmp" >> "$GITHUB_ENV"
          echo "TMP=/opt/tmp" >> "$GITHUB_ENV"
          echo "TEMP=/opt/tmp" >> "$GITHUB_ENV"
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Restore uv cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: /opt/uv-cache
          key: |
            uv-Linux-${{ inputs.python-version }}-${{ hashFiles('src/zenml/integrations/*/__init__.py') }}
          restore-keys: |
            uv-Linux-${{ inputs.python-version }}-
      - name: Setup environment
        uses: ./.github/actions/setup_environment
        with:
          cache_version: ${{ secrets.GH_ACTIONS_CACHE_KEY }}
          python-version: ${{ inputs.python-version }}
          os: ubuntu-latest
          install_integrations: 'yes'
      - name: Install offload
        run: cargo install offload
      - name: Install Modal SDK
        run: uv pip install --system modal
      - name: Set Python version in Dockerfile
        if: inputs.python-version != '3.12'
        run: sed -i "s/python:3.12/python:${{ inputs.python-version }}/" docker/offload-test.Dockerfile
      - name: Replace .dockerignore for offload
        run: |
          cp .dockerignore .dockerignore.bak
          cp .offloadignore .dockerignore
      - name: Run tests on Modal via offload
        run: bash scripts/test-offload.sh
      - name: Restore .dockerignore
        if: always()
        run: mv .dockerignore.bak .dockerignore
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: offload-test-results-py${{ inputs.python-version }}
          path: test-results/
          retention-days: 14
