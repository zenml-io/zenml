---
name: Tests (Offload on Modal)
on:
  workflow_call:
    inputs:
      python-version:
        description: Python version for Modal sandbox
        type: string
        required: false
        default: '3.11'
  workflow_dispatch:
    inputs:
      python-version:
        description: Python version for Modal sandbox
        type: string
        required: false
        default: '3.11'
jobs:
  offload-test:
    name: offload-test (py${{ inputs.python-version }})
    runs-on: ubuntu-latest
    env:
      ZENML_DEBUG: 1
      ZENML_ANALYTICS_OPT_IN: false
      PYTHONIOENCODING: utf-8
      UV_HTTP_TIMEOUT: 600
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MODAL_ENVIRONMENT: ci
    if: ${{ ! startsWith(github.event.head_commit.message, 'GitBook:') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'
      - name: Install local dev dependencies (for test discovery)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          source $HOME/.cargo/env
          uv pip install --system -e ".[dev]"
      - name: Install offload
        run: |
          source $HOME/.cargo/env
          cargo install offload
      - name: Install Modal SDK
        run: uv pip install --system modal
      - name: Set Python version in Dockerfile
        if: inputs.python-version != '3.11'
        run: sed -i "s/python:3.11/python:${{ inputs.python-version }}/" docker/offload-test.Dockerfile
      - name: Run tests on Modal via offload
        run: bash scripts/test-offload.sh
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: offload-test-results-py${{ inputs.python-version }}
          path: test-results/
          retention-days: 14
