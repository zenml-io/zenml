---
# Scheduled develop qualification and label-triggered advisory PR slow CI.
# Qualification publishing (Check Runs, incident issues) is deferred to PR 3;
# a red scheduled run is only visible in the Actions tab until that ships.
name: ci-slow
on:
  schedule:
    - cron: 0 0 * * *
  pull_request:
    types: [labeled, synchronize, reopened, ready_for_review]
  workflow_call:
    inputs:
      git-ref:
        description: Git branch or ref to test
        type: string
        required: false
        default: develop
  workflow_dispatch:
    inputs:
      git-ref:
        description: Git branch or ref to test
        type: string
        required: false
        default: develop
permissions:
  contents: read
concurrency:
  # Use ref so manual dispatches on different refs don't cancel each other.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || inputs.git-ref
    || 'develop' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  resolve-ref:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    outputs:
      git-ref: ${{ steps.ref.outputs.git-ref }}
      should-run: ${{ steps.ref.outputs.should-run }}
    steps:
      - name: Resolve git ref
        id: ref
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        env:
          GIT_REF: ${{ inputs.git-ref || 'develop' }}
        with:
          script: |
            if (context.eventName !== 'pull_request') {
              core.setOutput('git-ref', process.env.GIT_REF || 'develop');
              core.setOutput('should-run', 'true');
              return;
            }
            const pullRequest = context.payload.pull_request;
            const labels = pullRequest.labels ?? [];
            const hasSlowCiLabel = labels.some((label) => label.name === 'run-slow-ci');
            const wasSlowCiLabelAdded = context.payload.action === 'labeled'
              && context.payload.label?.name === 'run-slow-ci';
            const shouldRun = wasSlowCiLabelAdded || (
              hasSlowCiLabel
              && ['synchronize', 'reopened', 'ready_for_review'].includes(context.payload.action)
            );
            core.setOutput('git-ref', pullRequest.head.sha);
            core.setOutput('should-run', shouldRun ? 'true' : 'false');
            if (!shouldRun) {
              core.notice('Skipping advisory slow CI because run-slow-ci is not active for this PR event.');
            }
  mysql-db-migration-testing-full:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ needs.resolve-ref.outputs.git-ref }}
          fetch-depth: 0
      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.10'
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
          == false
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Test full migrations
        run: bash scripts/test-migrations.sh mysql full
  sqlite-db-migration-testing-full:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ needs.resolve-ref.outputs.git-ref }}
          fetch-depth: 0
      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.10'
      - name: Test full migrations
        run: bash scripts/test-migrations.sh sqlite full
  mariadb-db-migration-testing-full:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ needs.resolve-ref.outputs.git-ref }}
          fetch-depth: 0
      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.10'
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
          == false
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Test full migrations
        run: bash scripts/test-migrations.sh mariadb full
  small-checks:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ needs.resolve-ref.outputs.git-ref }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          source $HOME/.cargo/env
      - name: Create virtual environment
        run: uv venv
      - name: Check for broken dependencies
        run: |
          source .venv/bin/activate
          uv pip check
      - name: Markdown link check
        uses: gaurav-nelson/github-action-markdown-link-check@3c3b66f1f7d0900e37b71eca45b63ea9eedfce31  # 1.0.17
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'no'
          folder-path: ./examples, ./docs/book, ./src
          file-path: ./README.md, ./LICENSE, ./RELEASE_NOTES.md, CODE-OF-CONDUCT.md,
            CONTRIBUTING.md, CLA.md, RELEASE_NOTES.md, ROADMAP.md
          config-file: .github/workflows/markdown_check_config.json
        continue-on-error: true
      - name: Security check
        run: |
          source .venv/bin/activate
          uv pip install bandit
          bash scripts/check-security.sh
      - name: Check for alembic branch divergence
        env:
          ZENML_DEBUG: 0
        run: |
          source .venv/bin/activate
          uv pip install alembic
          bash scripts/check-alembic-branches.sh
      - name: Install latest dashboard (test gitignore)
        run: bash scripts/install-dashboard.sh
  ubuntu-linting:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.12', '3.13', '3.14']
      fail-fast: false
    uses: ./.github/workflows/linting.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  ubuntu-unit-test:
    needs: [resolve-ref, ubuntu-linting]
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.12', '3.13', '3.14']
      fail-fast: false
    uses: ./.github/workflows/unit-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  windows-linting:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    uses: ./.github/workflows/linting.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  windows-unit-test:
    needs: [resolve-ref, windows-linting]
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    uses: ./.github/workflows/unit-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  macos-linting:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    uses: ./.github/workflows/linting.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  macos-unit-test:
    needs: [resolve-ref, macos-linting]
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    uses: ./.github/workflows/unit-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      install_integrations: 'yes'
      reruns: 1
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  windows-integration-test:
    needs: [resolve-ref, windows-unit-test]
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        test_environment: [default]
      fail-fast: false
    uses: ./.github/workflows/integration-test-slow.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      test_environment: ${{ matrix.test_environment }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  macos-integration-test:
    needs: [resolve-ref, macos-unit-test]
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        test_environment: [default]
      fail-fast: false
    uses: ./.github/workflows/integration-test-slow.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      test_environment: ${{ matrix.test_environment }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  ubuntu-latest-integration-test:
    needs: [resolve-ref, ubuntu-unit-test]
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.10'
            test_environment: default
          - os: ubuntu-latest
            python-version: '3.11'
            test_environment: default
          - os: ubuntu-latest
            python-version: '3.12'
            test_environment: default
          - os: ubuntu-latest
            python-version: '3.13'
            test_environment: default
          - os: ubuntu-latest
            python-version: '3.13'
            test_environment: docker-server-docker-orchestrator-mysql
          - os: ubuntu-latest
            python-version: '3.13'
            test_environment: docker-server-docker-orchestrator-mariadb
      fail-fast: false
    uses: ./.github/workflows/integration-test-slow.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      test_environment: ${{ matrix.test_environment }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  vscode-tutorial-pipelines-test:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    uses: ./.github/workflows/vscode-tutorial-pipelines-test.yml
    with:
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  ubuntu-base-package-functionality:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11', '3.13']
      fail-fast: false
    uses: ./.github/workflows/base-package-functionality.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
