---
# Scheduled develop qualification and label-triggered advisory PR slow CI.
name: ci-slow
on:
  schedule:
    - cron: 0 0 * * *
  pull_request:
    types: [labeled, synchronize, reopened, ready_for_review]
    paths-ignore:
      - docs/**
      - '**.md'
      - .github/workflows/claude.yml
      - .claude/**
  workflow_call:
    inputs:
      git-ref:
        description: Git branch or ref to test
        type: string
        required: false
        default: develop
  workflow_dispatch:
    inputs:
      git-ref:
        description: Git branch or ref to test
        type: string
        required: false
        default: develop
permissions:
  contents: read
concurrency:
  # Use ref so manual dispatches on different refs don't cancel each other.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || inputs.git-ref
    || 'develop' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
env:
  ZENML_DEBUG: true
  ZENML_LOGGING_VERBOSITY: debug
  ZENML_ANALYTICS_OPT_IN: false
jobs:
  resolve-ref:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    outputs:
      git-ref: ${{ steps.ref.outputs.git-ref }}
      should-run: ${{ steps.ref.outputs.should-run }}
    steps:
      - name: Resolve git ref
        id: ref
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          GIT_REF: ${{ inputs.git-ref || 'develop' }}
        with:
          script: |
            if (context.eventName !== 'pull_request') {
              core.setOutput('git-ref', process.env.GIT_REF || 'develop');
              core.setOutput('should-run', 'true');
              return;
            }
            const pullRequest = context.payload.pull_request;
            const labels = pullRequest.labels ?? [];
            const hasSlowCiLabel = labels.some((label) => label.name === 'run-slow-ci');
            const wasSlowCiLabelAdded = context.payload.action === 'labeled'
              && context.payload.label?.name === 'run-slow-ci';
            const shouldRun = wasSlowCiLabelAdded || (
              hasSlowCiLabel
              && ['synchronize', 'reopened', 'ready_for_review'].includes(context.payload.action)
            );
            core.setOutput('git-ref', pullRequest.head.sha);
            core.setOutput('should-run', shouldRun ? 'true' : 'false');
            if (!shouldRun) {
              core.notice('Skipping advisory slow CI because run-slow-ci is not active for this PR event.');
            }
  mysql-db-migration-testing-full:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ needs.resolve-ref.outputs.git-ref }}
          fetch-depth: 0
      - name: Set up Python 3.10
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.10'
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
          == false
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Test full migrations
        run: bash scripts/test-migrations.sh mysql full
  sqlite-db-migration-testing-full:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ needs.resolve-ref.outputs.git-ref }}
          fetch-depth: 0
      - name: Set up Python 3.10
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.10'
      - name: Test full migrations
        run: bash scripts/test-migrations.sh sqlite full
  mariadb-db-migration-testing-full:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ needs.resolve-ref.outputs.git-ref }}
          fetch-depth: 0
      - name: Set up Python 3.10
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.10'
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
          == false
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Test full migrations
        run: bash scripts/test-migrations.sh mariadb full
  ubuntu-linting:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    uses: ./.github/workflows/linting.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  ubuntu-unit-test:
    needs: [resolve-ref, ubuntu-linting]
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    uses: ./.github/workflows/unit-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  windows-linting:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    uses: ./.github/workflows/linting.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  windows-unit-test:
    needs: [resolve-ref, windows-linting]
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    uses: ./.github/workflows/unit-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  macos-linting:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    uses: ./.github/workflows/linting.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  macos-unit-test:
    needs: [resolve-ref, macos-linting]
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
      fail-fast: false
    uses: ./.github/workflows/unit-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      install_integrations: 'yes'
      reruns: 1
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  windows-integration-test:
    needs: [resolve-ref, windows-unit-test]
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        test_environment: [default]
      fail-fast: false
    uses: ./.github/workflows/integration-test-slow.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      test_environment: ${{ matrix.test_environment }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  macos-integration-test:
    needs: [resolve-ref, macos-unit-test]
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        test_environment: [default]
      fail-fast: false
    uses: ./.github/workflows/integration-test-slow.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      test_environment: ${{ matrix.test_environment }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  ubuntu-latest-integration-test:
    needs: [resolve-ref, ubuntu-unit-test]
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.10'
            test_environment: default
          - os: ubuntu-latest
            python-version: '3.11'
            test_environment: default
          - os: ubuntu-latest
            python-version: '3.12'
            test_environment: default
          - os: ubuntu-latest
            python-version: '3.13'
            test_environment: default
          - os: ubuntu-latest
            python-version: '3.14'
            test_environment: default
          - os: ubuntu-latest
            python-version: '3.13'
            test_environment: docker-server-docker-orchestrator-mysql
          - os: ubuntu-latest
            python-version: '3.13'
            test_environment: docker-server-docker-orchestrator-mariadb
      fail-fast: false
    uses: ./.github/workflows/integration-test-slow.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      test_environment: ${{ matrix.test_environment }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  vscode-tutorial-pipelines-test:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    uses: ./.github/workflows/vscode-tutorial-pipelines-test.yml
    with:
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  ubuntu-base-package-functionality:
    needs: resolve-ref
    if: needs.resolve-ref.outputs.should-run == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11']
      fail-fast: false
    uses: ./.github/workflows/base-package-functionality.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
