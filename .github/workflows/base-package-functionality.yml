---
name: Test base package functionality
on:
  workflow_call:
    inputs:
      os:
        description: OS
        type: string
        required: true
      python-version:
        description: Python version
        type: string
        required: true
      git-ref:
        description: Git branch or ref
        type: string
        required: false
        default: ''
  workflow_dispatch:
    inputs:
      os:
        description: OS
        type: choice
        options: [ubuntu-latest, macos-13, windows-latest]
        required: false
        default: ubuntu-latest
      python-version:
        description: Python version
        type: choice
        options: ['3.10', '3.11', '3.12', '3.13', '3.14']
        required: false
        default: '3.13'
      git-ref:
        description: Git branch or ref
        type: string
        required: true
env:
  ZENML_DEBUG: 1
  ZENML_LOGGING_VERBOSITY: debug
  ZENML_ANALYTICS_OPT_IN: false
jobs:
  test-base-package-functionality:
    name: test-base-package-functionality
    runs-on: ${{ inputs.os }}
    env:
      PYTHONIOENCODING: utf-8
      UV_HTTP_TIMEOUT: 600
      OBJC_DISABLE_INITIALIZE_FORK_SAFETY: 'YES'
    if: ${{ ! startsWith(github.event.head_commit.message, 'GitBook:') && ! (inputs.os == 'windows-latest' && inputs.python-version == '3.11') && ! (inputs.os == 'windows-latest' && inputs.python-version == '3.12') }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ inputs.git-ref || github.event.pull_request.head.sha || github.sha }}
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: 0.8.14
      - name: Build server image
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
        run: |
          docker build \
            --build-arg PYTHON_VERSION="${PYTHON_VERSION}" \
            -t zenml-server-dev \
            -f docker/zenml-server-dev.Dockerfile \
            .
      - name: Install base package
        run: |
          uv pip install --system .
      - name: Start local server
        run: |
          docker run -d -p 8080:8080 -e ZENML_SERVER_AUTH_SCHEME=NO_AUTH -e ZENML_SERVER_AUTO_ACTIVATE=True zenml-server-dev
      - name: Test server connection works
        env:
          ZENML_STORE_URL: http://localhost:8080
        run: |-
          zenml stack list
