---
name: Modal CI fork PR notice
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
permissions:
  issues: write
  pull-requests: read
jobs:
  modal-fork-pr-comment:
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Comment on fork PR Modal lane behavior
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            const marker = '<!-- zenml-modal-ci-fork-notice -->';
            const body = `${marker}\nThanks for the contribution! The default fast CI lane runs on fork PRs, but the Modal-backed MySQL lane is skipped because it requires trusted CI credentials. A maintainer will get the full Modal signal before merge.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(comment => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
