---
name: ci-fast
on:
  workflow_dispatch:
  workflow_call:
  merge_group:
  push:
    branches: [develop]
  pull_request:
    types: [opened, synchronize, ready_for_review]
concurrency:
  # New commit on branch cancels running workflows of the same branch.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  sqlite-db-migration-testing-random:
    runs-on: ubuntu-latest
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.10'
      - name: Test migrations across versions
        run: bash scripts/test-migrations.sh sqlite random
  api-docs-test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
      - name: Test API docs buildable
        run: bash scripts/generate-docs.sh -v DUMMY -c
  static-checks:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    runs-on: ubuntu-latest
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: 1
      PYTHONIOENCODING: utf-8
      UV_HTTP_TIMEOUT: 600
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Set uv cache + temp dirs (/opt)
        run: |
          sudo mkdir -p /opt/uv-cache /opt/tmp
          sudo chown -R "$(id -u)":"$(id -g)" /opt/uv-cache /opt/tmp
          echo "UV_CACHE_DIR=/opt/uv-cache" >> "$GITHUB_ENV"
          echo "TMPDIR=/opt/tmp" >> "$GITHUB_ENV"
          echo "TMP=/opt/tmp" >> "$GITHUB_ENV"
          echo "TEMP=/opt/tmp" >> "$GITHUB_ENV"
      - name: Restore uv cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: /opt/uv-cache
          key: uv-${{ runner.os }}-3.11-${{ hashFiles('src/zenml/integrations/*/__init__.py')
            }}
          restore-keys: |
            uv-${{ runner.os }}-3.11-
      - name: Setup environment
        uses: ./.github/actions/setup_environment
        with:
          cache_version: ${{ secrets.GH_ACTIONS_CACHE_KEY }}
          python-version: '3.11'
          os: ubuntu-latest
          install_integrations: 'no'
      - name: Spellcheck
        uses: crate-ci/typos@7c572958218557a3272c2d6719629443b5cc26fd  # v1.45.2
        with:
          files: .
          config: ./.typos.toml
      - name: Lint
        run: |
          ruff check src/zenml tests/harness
          ruff check tests examples --extend-ignore D --extend-exclude "*.ipynb"
      - name: Docstring
        run: |
          uv pip install --system --force-reinstall --no-deps "docstring_parser_fork"
          pydoclint src/zenml tests/harness
  linux-fast-offload:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    uses: ./.github/workflows/linux-fast-offload.yml
    with:
      backend: modal
      python-version: '3.13'
      use-offload: true
    secrets: inherit
  linux-fast-offload-modal-mysql:
    if: github.event_name != 'pull_request' || (github.event.pull_request.draft ==
      false && github.event.pull_request.head.repo.full_name == github.repository)
    uses: ./.github/workflows/linux-fast-offload.yml
    with:
      backend: modal
      python-version: '3.13'
      use-offload: true
      test_environment: modal-server-mysql
    secrets: inherit
  default-serial-dynamic-pipeline-test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: 1
      ZENML_ENABLE_RICH_TRACEBACK: false
      ZENML_TEST_DEPLOYMENT_ROOT_PATH: /tmp/zenml-test-deploy
      PYTHONIOENCODING: utf-8
      UV_HTTP_TIMEOUT: 600
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set uv cache + temp dirs (/opt)
        run: |
          sudo mkdir -p /opt/uv-cache /opt/tmp
          sudo chown -R "$(id -u)":"$(id -g)" /opt/uv-cache /opt/tmp
          echo "UV_CACHE_DIR=/opt/uv-cache" >> "$GITHUB_ENV"
          echo "TMPDIR=/opt/tmp" >> "$GITHUB_ENV"
          echo "TMP=/opt/tmp" >> "$GITHUB_ENV"
          echo "TEMP=/opt/tmp" >> "$GITHUB_ENV"
      - name: Setup environment
        uses: ./.github/actions/setup_environment
        with:
          cache_version: ${{ secrets.GH_ACTIONS_CACHE_KEY }}
          python-version: '3.13'
          os: ubuntu-latest
          install_integrations: 'no'
      - name: Run serial dynamic pipeline wait/abort test
        run: >-
          python -m pytest -p no:pytest_postgresql -v --tb=short
          --no-provision --environment default
          -p no:randomly -p no:rerunfailures
          tests/unit/execution/pipeline/dynamic/test_child_pipelines.py::test_wait_abort_aborts_run
          tests/unit/execution/pipeline/dynamic/test_child_pipelines.py::test_parent_waits_while_child_runs_then_wait_resolves
  modal-mysql-serial-shared-state-tests:
    if: (github.event_name != 'pull_request' || (github.event.pull_request.draft ==
      false && github.event.pull_request.head.repo.full_name == github.repository))
      && vars.ZENML_CI_MODAL_DISABLED != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: 1
      ZENML_ENABLE_RICH_TRACEBACK: false
      ZENML_TEST_DEPLOYMENT_ROOT_PATH: /tmp/zenml-test-deploy
      PYTHONIOENCODING: utf-8
      UV_HTTP_TIMEOUT: 600
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set uv cache + temp dirs (/opt)
        run: |
          sudo mkdir -p /opt/uv-cache /opt/tmp
          sudo chown -R "$(id -u)":"$(id -g)" /opt/uv-cache /opt/tmp
          echo "UV_CACHE_DIR=/opt/uv-cache" >> "$GITHUB_ENV"
          echo "TMPDIR=/opt/tmp" >> "$GITHUB_ENV"
          echo "TMP=/opt/tmp" >> "$GITHUB_ENV"
          echo "TEMP=/opt/tmp" >> "$GITHUB_ENV"
      - name: Setup environment
        uses: ./.github/actions/setup_environment
        with:
          cache_version: ${{ secrets.GH_ACTIONS_CACHE_KEY }}
          python-version: '3.13'
          os: ubuntu-latest
          install_integrations: 'no'
      - name: Install Modal SDK
        run: python -m pip install --upgrade 'modal>=1.0.0'
      - name: Prepare result directory
        run: mkdir -p .ci/modal-mysql-serial
      - name: Start Modal MySQL sandbox
        id: modal-server
        env:
          ZENML_CI_MODAL_DISABLED: ${{ vars.ZENML_CI_MODAL_DISABLED }}
          ZENML_CI_CHECKOUT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
        run: python scripts/ci_modal_mysql_sandbox.py start
      - name: Run serial shared-state tests
        env:
          MODAL_CI_SERVER_URL: ${{ steps.modal-server.outputs.server_url }}
          MODAL_CI_SERVER_USERNAME: ${{ steps.modal-server.outputs.server_username }}
          ZENML_CI_CHECKOUT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          export MODAL_CI_SERVER_PASSWORD
          MODAL_CI_SERVER_PASSWORD=$(python - <<'PY'
          from scripts.ci_modal_mysql_sandbox import derive_server_password
          print(derive_server_password())
          PY
          )
          python -m pytest -p no:pytest_postgresql -v --tb=short \
            --junitxml=.ci/modal-mysql-serial/junit.xml \
            --no-provision --environment remote-mysql-modal \
            -p no:randomly -p no:rerunfailures \
            tests/integration/functional/zen_stores/test_secrets_store.py::test_list_secrets_pagination_and_sorting \
            'tests/integration/functional/model/test_model_version.py::TestModel::test_deletion_of_links[True]'
      - name: Stop Modal MySQL sandbox
        if: always() && steps.modal-server.outputs.sandbox_id != ''
        env:
          SANDBOX_ID: ${{ steps.modal-server.outputs.sandbox_id }}
        run: python scripts/ci_modal_mysql_sandbox.py stop --sandbox-id "$SANDBOX_ID"
      - name: Upload serial Modal MySQL artifacts
        if: always()
        uses: actions/upload-artifact@2848b2cda0e5190984587ec6bb1f36730ca78d50  # untagged
        with:
          name: modal-mysql-serial-shared-state-tests-artifacts
          path: .ci/modal-mysql-serial
          if-no-files-found: warn
  ci-fast-required:
    runs-on: ubuntu-latest
    needs:
      - sqlite-db-migration-testing-random
      - api-docs-test
      - static-checks
      - linux-fast-offload
      - linux-fast-offload-modal-mysql
      - default-serial-dynamic-pipeline-test
      - modal-mysql-serial-shared-state-tests
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.draft
      == false)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Verify required fast CI jobs
        env:
          NEEDS_CONTEXT: ${{ toJSON(needs) }}
        run: >-
          python scripts/ci/verify_required_jobs.py
          --lane Fast
          --needs-json "$NEEDS_CONTEXT"
          --allow-skipped linux-fast-offload-modal-mysql
          --allow-skipped modal-mysql-serial-shared-state-tests
