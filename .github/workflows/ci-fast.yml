---
name: ci-fast
on:
  workflow_dispatch:
  workflow_call:
  merge_group:
  push:
    branches: [develop]
  pull_request:
    types: [opened, synchronize, ready_for_review]
concurrency:
  # New commit on branch cancels running workflows of the same branch.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  sqlite-db-migration-testing-random:
    runs-on: ubuntu-latest
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.10'
      - name: Test migrations across versions
        run: bash scripts/test-migrations.sh sqlite random
  spellcheck:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Spelling checker
        uses: crate-ci/typos@7c572958218557a3272c2d6719629443b5cc26fd  # v1.45.2
        with:
          files: .
          config: ./.typos.toml
  api-docs-test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
      - name: Test API docs buildable
        run: bash scripts/generate-docs.sh -v DUMMY -c
  update-templates-to-examples:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name
      == 'zenml-io/zenml' && github.event.pull_request.draft == false
    uses: ./.github/workflows/update-templates-to-examples.yml
    with:
      python-version: '3.11'
      os: ubuntu-latest
    secrets: inherit
  linting:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11']
      fail-fast: false
    uses: ./.github/workflows/linting.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
    secrets: inherit
  linux-fast-offload:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    uses: ./.github/workflows/linux-fast-offload.yml
    with:
      backend: modal
      python-version: '3.13'
      use-offload: true
    secrets: inherit
  linux-fast-offload-modal-mysql:
    if: github.event_name != 'pull_request' || (github.event.pull_request.draft ==
      false && github.event.pull_request.head.repo.full_name == github.repository)
    uses: ./.github/workflows/linux-fast-offload.yml
    with:
      backend: modal
      python-version: '3.13'
      use-offload: true
      test_environment: modal-server-mysql
    secrets: inherit
  ci-fast-required:
    runs-on: ubuntu-latest
    needs:
      - sqlite-db-migration-testing-random
      - spellcheck
      - api-docs-test
      - update-templates-to-examples
      - linting
      - linux-fast-offload
      - linux-fast-offload-modal-mysql
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.draft
      == false)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Verify required fast CI jobs
        env:
          NEEDS_CONTEXT: ${{ toJSON(needs) }}
        run: >-
          python scripts/ci/verify_required_jobs.py
          --lane Fast
          --needs-json "$NEEDS_CONTEXT"
          --allow-skipped update-templates-to-examples
          --allow-skipped linux-fast-offload-modal-mysql
