---
name: ci-fast
on:
  workflow_dispatch:
  workflow_call:
  merge_group:
  pull_request:
    types: [opened, synchronize, ready_for_review]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  sqlite-db-migration-testing-random:
    runs-on: ubuntu-latest
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
      - name: Test migrations across versions
        run: bash scripts/test-migrations.sh sqlite random
  spellcheck:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Spelling checker
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89  # v1.47.2
        with:
          files: .
          config: ./.typos.toml
  api-docs-test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
      - name: Test API docs buildable
        run: bash scripts/generate-docs.sh -v DUMMY -c
  linting:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.13']
      fail-fast: false
    uses: ./.github/workflows/linting.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
    secrets: inherit
  unit-test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    uses: ./.github/workflows/unit-test.yml
    with:
      python-version: '3.13'
      os: ubuntu-latest
      install_integrations: 'yes'
    secrets: inherit
  default-integration-test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    uses: ./.github/workflows/integration-test-fast.yml
    with:
      python-version: '3.13'
      os: ubuntu-latest
      test_environment: default
      ci_tier: fast
    secrets: inherit
  update-templates-to-examples:
    # This job is allowed to skip because it cannot push template sync commits
    # for fork PRs, drafts, or merge-queue events.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name
      == 'zenml-io/zenml' && github.event.pull_request.draft == false
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/update-templates-to-examples.yml
    with:
      python-version: '3.13'
      os: ubuntu-latest
    secrets: inherit
  ci-fast-required:
    runs-on: ubuntu-latest
    needs:
      - sqlite-db-migration-testing-random
      - spellcheck
      - api-docs-test
      - linting
      - unit-test
      - default-integration-test
      - update-templates-to-examples
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.draft
      == false)
    steps:
      - name: Check all required fast-CI jobs passed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # v1.2.2
        with:
          allowed-skips: update-templates-to-examples
          jobs: ${{ toJSON(needs) }}
