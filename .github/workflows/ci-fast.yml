---
name: ci-fast
on:
  workflow_dispatch:
  merge_group:
  pull_request:
    types: [opened, synchronize, ready_for_review]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: read
env:
  ZENML_DEBUG: true
  ZENML_LOGGING_VERBOSITY: debug
  ZENML_ANALYTICS_OPT_IN: false
jobs:
  classify-changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.changes.outputs.docs_only }}
    steps:
      - name: Classify changed files
        id: changes
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            if (context.eventName !== 'pull_request') {
              core.setOutput('docs_only', 'false');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const docsOnly = files.length > 0 && files.every(({ filename }) =>
              filename.startsWith('docs/')
              || filename.endsWith('.md')
              || filename.startsWith('.claude/')
              || filename === '.github/workflows/claude.yml'
            );

            core.setOutput('docs_only', docsOnly ? 'true' : 'false');
            core.notice(docsOnly
              ? 'Skipping code-focused fast CI for this documentation-only PR.'
              : 'Running the complete fast CI suite.');
  sqlite-db-migration-testing-random:
    needs: classify-changes
    runs-on: ubuntu-latest
    if: (github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false) && needs.classify-changes.outputs.docs_only != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python 3.10
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.10'
      - name: Test migrations across versions
        run: bash scripts/test-migrations.sh sqlite random
  spellcheck:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Spelling checker
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89  # v1.47.2
        with:
          files: .
          config: ./.typos.toml
  api-docs-test:
    needs: classify-changes
    if: (github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false) && needs.classify-changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python 3.13
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'
      - name: Test API docs buildable
        run: bash scripts/generate-docs.sh -v DUMMY -c
  linting:
    needs: classify-changes
    if: (github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false) && needs.classify-changes.outputs.docs_only != 'true'
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.13']
      fail-fast: false
    uses: ./.github/workflows/linting.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
    secrets: inherit
  unit-test:
    needs: classify-changes
    if: (github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false) && needs.classify-changes.outputs.docs_only != 'true'
    uses: ./.github/workflows/unit-test.yml
    with:
      python-version: '3.13'
      os: ubuntu-latest
      install_integrations: 'yes'
    secrets: inherit
  default-integration-test:
    needs: classify-changes
    if: (github.event_name != 'pull_request' || github.event.pull_request.draft ==
      false) && needs.classify-changes.outputs.docs_only != 'true'
    uses: ./.github/workflows/integration-test-fast.yml
    with:
      python-version: '3.13'
      os: ubuntu-latest
      test_environment: default
    secrets: inherit
  update-templates-to-examples:
    needs: classify-changes
    # This job is allowed to skip because it cannot push template sync commits
    # for fork PRs, drafts, or merge-queue events.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name
      == 'zenml-io/zenml' && github.event.pull_request.draft == false && needs.classify-changes.outputs.docs_only
      != 'true'
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/update-templates-to-examples.yml
    with:
      python-version: '3.13'
      os: ubuntu-latest
    secrets: inherit
  ci-fast-required:
    runs-on: ubuntu-latest
    needs:
      - classify-changes
      - sqlite-db-migration-testing-random
      - spellcheck
      - api-docs-test
      - linting
      - unit-test
      - default-integration-test
      - update-templates-to-examples
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.draft
      == false)
    steps:
      - name: Check documentation-only fast-CI jobs passed
        if: needs.classify-changes.outputs.docs_only == 'true'
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # v1.2.2
        with:
          allowed-skips: >-
            ["sqlite-db-migration-testing-random", "api-docs-test", "linting",
            "unit-test", "default-integration-test",
            "update-templates-to-examples"]
          jobs: ${{ toJSON(needs) }}
      - name: Check all required fast-CI jobs passed
        if: needs.classify-changes.outputs.docs_only != 'true'
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe  # v1.2.2
        with:
          allowed-skips: update-templates-to-examples
          jobs: ${{ toJSON(needs) }}
