---
name: ci-fast
on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [main]
    paths-ignore:
      - docs/**
      - '*'
      - '!Dockerfile.ci'
      - '!.dockerignore'
      - '!offload.toml'
      - '!scripts/ci/**'
      - '!scripts/run-fast-ci-offload.sh'
      - '!.github/workflows/ci-fast.yml'
      - '!.github/workflows/linux-fast-modal.yml'
      - '!pyproject.toml'
      - '**.md'
      - .github/workflows/claude.yml
      - .claude/**
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths-ignore:
      - docs/**
      - '*'
      - '!Dockerfile.ci'
      - '!.dockerignore'
      - '!offload.toml'
      - '!scripts/ci/**'
      - '!scripts/run-fast-ci-offload.sh'
      - '!.github/workflows/ci-fast.yml'
      - '!.github/workflows/linux-fast-modal.yml'
      - '!pyproject.toml'
      - '**.md'
      - .github/workflows/claude.yml
      - .claude/**
concurrency:
  # New commit on branch cancels running workflows of the same branch
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  sqlite-db-migration-testing-random:
    runs-on: ubuntu-latest
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
    # if team member commented, not a draft, on a PR, using /fulltest
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.10'
      - name: Test migrations across versions
        run: bash scripts/test-migrations.sh sqlite random
  spellcheck:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Spelling checker
        uses: crate-ci/typos@02ea592e44b3a53c302f697cddca7641cd051c3d  # v1.45.0
        with:
          files: .
          config: ./.typos.toml
  api-docs-test:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
      - name: Test API docs buildable
        run: bash scripts/generate-docs.sh -v DUMMY -c
  update-templates-to-examples:
    # this doesn't work on forked repositories (i.e. outside contributors)
    # so we disable template updates for those PRs / branches
    if: github.event.pull_request.head.repo.full_name == 'zenml-io/zenml' && github.event.pull_request.draft
      == false
    uses: ./.github/workflows/update-templates-to-examples.yml
    with:
      python-version: '3.11'
      os: ubuntu-latest
    secrets: inherit
  linting:
    if: github.event.pull_request.draft == false
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11']
      fail-fast: false
    uses: ./.github/workflows/linting.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
    secrets: inherit
  linux-fast-modal:
    if: github.event.pull_request.draft == false
    uses: ./.github/workflows/linux-fast-modal.yml
    with:
      python-version: '3.13'
      use_modal: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    secrets: inherit
  ubuntu-latest-docker-integration-test:
    needs: [linting]
    if: github.event.pull_request.draft == false
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11']
        test_environment: [docker-server-docker-orchestrator-mysql]
      fail-fast: false
    uses: ./.github/workflows/integration-test-fast.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      test_environment: ${{ matrix.test_environment }}
    secrets: inherit
