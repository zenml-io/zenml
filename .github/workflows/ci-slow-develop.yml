---
name: ci-slow-develop
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      git-ref:
        description: Git branch or ref to qualify
        type: string
        required: false
        default: develop
permissions:
  contents: read
  checks: write
  issues: write
concurrency:
  group: ${{ github.workflow }}-${{ inputs.git-ref || 'develop' }}
  cancel-in-progress: false
jobs:
  resolve-ref:
    runs-on: ubuntu-latest
    outputs:
      git-ref: ${{ steps.ref.outputs.git-ref }}
    steps:
      - id: ref
        run: echo "git-ref=${{ inputs.git-ref || 'develop' }}" >> "$GITHUB_OUTPUT"
  mysql-db-migration-testing-random:
    needs: resolve-ref
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
      RANDOM_MIGRATION_COUNT: 5
      RANDOM_MIGRATION_SEED: ${{ github.run_number }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.resolve-ref.outputs.git-ref }}
          fetch-depth: 0
      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.10'
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Test random migrations
        run: bash scripts/test-migrations.sh mysql random
  sqlite-db-migration-testing-random:
    needs: resolve-ref
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
      RANDOM_MIGRATION_COUNT: 5
      RANDOM_MIGRATION_SEED: ${{ github.run_number }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.resolve-ref.outputs.git-ref }}
          fetch-depth: 0
      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.10'
      - name: Test random migrations
        run: bash scripts/test-migrations.sh sqlite random
  mariadb-db-migration-testing-random:
    needs: resolve-ref
    env:
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEBUG: true
      RANDOM_MIGRATION_COUNT: 5
      RANDOM_MIGRATION_SEED: ${{ github.run_number }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.resolve-ref.outputs.git-ref }}
          fetch-depth: 0
      - name: Set up Python 3.10
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.10'
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Test random migrations
        run: bash scripts/test-migrations.sh mariadb random
  small-checks:
    needs: resolve-ref
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.resolve-ref.outputs.git-ref }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          source $HOME/.cargo/env
      - name: Create virtual environment
        run: uv venv
      - name: Check for broken dependencies
        run: |
          source .venv/bin/activate
          uv pip check
      - name: Markdown link check
        uses: gaurav-nelson/github-action-markdown-link-check@3c3b66f1f7d0900e37b71eca45b63ea9eedfce31  # 1.0.17
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'no'
          folder-path: ./examples, ./docs/book, ./src
          file-path: ./README.md, ./LICENSE, ./RELEASE_NOTES.md, CODE-OF-CONDUCT.md, CONTRIBUTING.md, CLA.md, RELEASE_NOTES.md, ROADMAP.md
          config-file: .github/workflows/markdown_check_config.json
        continue-on-error: true
      - name: Security check
        run: |
          source .venv/bin/activate
          uv pip install bandit
          bash scripts/check-security.sh
      - name: Check for alembic branch divergence
        env:
          ZENML_DEBUG: 0
        run: |
          source .venv/bin/activate
          uv pip install alembic
          bash scripts/check-alembic-branches.sh
      - name: Install latest dashboard (test gitignore)
        run: bash scripts/install-dashboard.sh
  ubuntu-linting:
    needs: resolve-ref
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.12', '3.13']
      fail-fast: false
    uses: ./.github/workflows/linting.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  ubuntu-unit-test:
    needs: [resolve-ref, ubuntu-linting]
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.12', '3.13']
      fail-fast: false
    uses: ./.github/workflows/unit-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  windows-linting:
    needs: resolve-ref
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
      fail-fast: false
    uses: ./.github/workflows/linting.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  windows-unit-test:
    needs: [resolve-ref, windows-linting]
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
      fail-fast: false
    uses: ./.github/workflows/unit-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  macos-linting:
    needs: resolve-ref
    strategy:
      matrix:
        os: [macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
      fail-fast: false
    uses: ./.github/workflows/linting.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  macos-unit-test:
    needs: [resolve-ref, macos-linting]
    strategy:
      matrix:
        os: [macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
      fail-fast: false
    uses: ./.github/workflows/unit-test.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      install_integrations: 'yes'
      reruns: 1
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  windows-integration-test:
    needs: [resolve-ref, windows-unit-test]
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
        test_environment: [default]
      fail-fast: false
    uses: ./.github/workflows/integration-test-slow.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      test_environment: ${{ matrix.test_environment }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  macos-integration-test:
    needs: [resolve-ref, macos-unit-test]
    strategy:
      matrix:
        os: [macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
        test_environment: [default]
      fail-fast: false
    uses: ./.github/workflows/integration-test-slow.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      test_environment: ${{ matrix.test_environment }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  ubuntu-latest-integration-test:
    needs: [resolve-ref, ubuntu-unit-test]
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.13']
        test_environment:
          - default
          - docker-server-docker-orchestrator-mysql
          - docker-server-docker-orchestrator-mariadb
        exclude:
          - test_environment: docker-server-docker-orchestrator-mysql
            python-version: '3.10'
          - test_environment: docker-server-docker-orchestrator-mysql
            python-version: '3.13'
          - test_environment: docker-server-docker-orchestrator-mariadb
            python-version: '3.10'
          - test_environment: docker-server-docker-orchestrator-mariadb
            python-version: '3.13'
      fail-fast: false
    uses: ./.github/workflows/integration-test-slow.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      test_environment: ${{ matrix.test_environment }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  vscode-tutorial-pipelines-test:
    needs: resolve-ref
    uses: ./.github/workflows/vscode-tutorial-pipelines-test.yml
    with:
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  ubuntu-base-package-functionality:
    needs: resolve-ref
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11']
      fail-fast: false
    uses: ./.github/workflows/base-package-functionality.yml
    with:
      python-version: ${{ matrix.python-version }}
      os: ${{ matrix.os }}
      git-ref: ${{ needs.resolve-ref.outputs.git-ref }}
    secrets: inherit
  publish-qualification-success:
    needs:
      - resolve-ref
      - mysql-db-migration-testing-random
      - sqlite-db-migration-testing-random
      - mariadb-db-migration-testing-random
      - small-checks
      - ubuntu-unit-test
      - windows-unit-test
      - macos-unit-test
      - windows-integration-test
      - macos-integration-test
      - ubuntu-latest-integration-test
      - vscode-tutorial-pipelines-test
      - ubuntu-base-package-functionality
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.resolve-ref.outputs.git-ref }}
          fetch-depth: 0
      - name: Publish qualification Check Run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/publish_ci_qualification.py --conclusion success
  publish-qualification-failure:
    needs:
      - resolve-ref
      - mysql-db-migration-testing-random
      - sqlite-db-migration-testing-random
      - mariadb-db-migration-testing-random
      - small-checks
      - ubuntu-unit-test
      - windows-unit-test
      - macos-unit-test
      - windows-integration-test
      - macos-integration-test
      - ubuntu-latest-integration-test
      - vscode-tutorial-pipelines-test
      - ubuntu-base-package-functionality
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.resolve-ref.outputs.git-ref }}
          fetch-depth: 0
      - name: Publish failure Check Run and incident
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/publish_ci_qualification.py --conclusion failure --incident
