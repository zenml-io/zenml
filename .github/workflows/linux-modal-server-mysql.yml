---
name: Linux Modal Server MySQL
on:
  workflow_call:
    inputs:
      python-version:
        description: Python version
        type: string
        required: false
        default: '3.13'
  workflow_dispatch:
    inputs:
      python-version:
        description: Python version
        type: string
        required: false
        default: '3.13'
jobs:
  modal-server-rest-mysql-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      modal_infra_failed: ${{ steps.classify.outputs.modal_infra_failed }}
    env:
      ZENML_DEBUG: 1
      ZENML_ANALYTICS_OPT_IN: false
      PYTHONIOENCODING: utf-8
      PYTHONDONTWRITEBYTECODE: 1
      MODAL_ENVIRONMENT: ci
      UV_VERSION: 0.8.22
    defaults:
      run:
        shell: bash
    steps:
      - name: Set cache + temp dirs (/opt)
        run: |
          sudo mkdir -p /opt/uv-cache /opt/pip-cache /opt/tmp
          sudo chown -R "$(id -u)":"$(id -g)" /opt/uv-cache /opt/pip-cache /opt/tmp
          echo "UV_CACHE_DIR=/opt/uv-cache" >> "$GITHUB_ENV"
          echo "PIP_CACHE_DIR=/opt/pip-cache" >> "$GITHUB_ENV"
          echo "PYTHONPATH=$GITHUB_WORKSPACE/src:$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
          echo "TMPDIR=/opt/tmp" >> "$GITHUB_ENV"
          echo "TMP=/opt/tmp" >> "$GITHUB_ENV"
          echo "TEMP=/opt/tmp" >> "$GITHUB_ENV"
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Restore runner dependency cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: |
            /opt/uv-cache
            /opt/pip-cache
          key: uv-modal-server-rest-mysql-ci-${{ runner.os }}-${{ inputs.python-version }}-${{ env.UV_VERSION }}-${{
            hashFiles('pyproject.toml', 'scripts/ci/modal_sandbox_requirements.txt')
            }}
          restore-keys: |
            uv-modal-server-rest-mysql-ci-${{ runner.os }}-${{ inputs.python-version }}-${{ env.UV_VERSION }}-
            uv-modal-server-rest-mysql-ci-${{ runner.os }}-${{ inputs.python-version }}-
            uv-modal-server-rest-mysql-ci-${{ runner.os }}-
      - name: Set up Python
        id: setup_python
        continue-on-error: true
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}
      - name: Configure git
        run: |
          git config --global user.email "info@zenml.io"
          git config --global user.name "ZenML GmbH"
      - name: Install Rust
        id: install_rust
        continue-on-error: true
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - name: Cache cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/offload
          key: cargo-offload-${{ runner.os }}-455356a6aae31b15c5becc2594600513525c9e46-v1
      - name: Prepare Modal runtime
        id: prepare
        continue-on-error: true
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          set -euo pipefail
          echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"
          trap 'echo "ended_at=$(date +%s)" >> "$GITHUB_OUTPUT"' EXIT
          if [[ -z "${MODAL_TOKEN_ID:-}" || -z "${MODAL_TOKEN_SECRET:-}" ]]; then
            echo "::error::Modal credentials are required for this workflow."
            exit 1
          fi
          if ! command -v offload >/dev/null 2>&1; then
            cargo install --git https://github.com/safoinme/offload.git --rev 455356a6aae31b15c5becc2594600513525c9e46
          fi
          if ! command -v uv >/dev/null 2>&1; then
            python -m pip install --upgrade "uv==${UV_VERSION}"
          fi
          runner_extras=".[server,templates,terraform,secrets-aws,secrets-gcp,secrets-azure,secrets-hashicorp,s3fs,gcsfs,adlfs,dev,connectors-aws,connectors-gcp,connectors-azure,azureml,sagemaker,vertex]"
          uv pip install --system -e "$runner_extras" -r scripts/ci/modal_sandbox_requirements.txt
          uv pip install --system "setuptools<82"
      - name: Restore offload image cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: .offload-image-cache
          key: offload-image-v2-${{ runner.os }}-${{ inputs.python-version }}-${{
            hashFiles('Dockerfile.ci', '.dockerignore', 'pyproject.toml', 'scripts/install-zenml-dev.sh',
            'offload.toml', 'offload-modal-server-mysql.toml') }}
          restore-keys: |
            offload-image-v2-${{ runner.os }}-${{ inputs.python-version }}-
      - name: Restore JUnit duration cache
        id: restore_junit_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: test-results/modal-server-rest-mysql-ci/junit.xml
          key: offload-modal-server-rest-mysql-ci-junit-${{ runner.os }}-${{ inputs.python-version
            }}
          restore-keys: |
            offload-modal-server-rest-mysql-ci-junit-${{ runner.os }}-
      - name: Seed JUnit durations from baseline if cache missed
        if: ${{ steps.restore_junit_cache.outputs.cache-hit != 'true' && hashFiles('ci/baseline-junit.xml') != '' }}
        run: |
          set -euo pipefail
          mkdir -p test-results/modal-server-rest-mysql-ci
          cp ci/baseline-junit.xml test-results/modal-server-rest-mysql-ci/junit.xml
      - name: Provision Modal server
        id: provision
        if: ${{ steps.setup_python.outcome == 'success' && steps.install_rust.outcome == 'success' && steps.prepare.outcome == 'success' }}
        continue-on-error: true
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          set -euo pipefail
          echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"
          trap 'echo "ended_at=$(date +%s)" >> "$GITHUB_OUTPUT"' EXIT
          python scripts/ci/provision_modal_server.py
      - name: Run tests via offload
        id: run
        if: ${{ steps.provision.outcome == 'success' }}
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          ZENML_MODAL_SERVER_URL: ${{ steps.provision.outputs.server_url }}
          ZENML_MODAL_SERVER_USERNAME: ${{ steps.provision.outputs.server_username }}
          ZENML_MODAL_SERVER_PASSWORD: ${{ steps.provision.outputs.server_password }}
        run: |
          set -euo pipefail
          run_started_at="$(date +%s)"
          echo "started_at=$run_started_at" >> "$GITHUB_OUTPUT"
          original_offload=""
          finish_run() {
            echo "ended_at=$(date +%s)" >> "$GITHUB_OUTPUT"
            if [[ -n "$original_offload" && -f "$original_offload" ]]; then
              cp "$original_offload" offload.toml
              rm -f "$original_offload"
            fi
          }
          trap finish_run EXIT
          offload_log="test-results/modal-server-rest-mysql-ci/offload.log"
          junit_file="test-results/modal-server-rest-mysql-ci/junit.xml"
          mkdir -p "$(dirname "$offload_log")"
          if [[ -f "$junit_file" ]]; then
            touch -d "2000-01-01 00:00:00 UTC" "$junit_file"
          fi
          echo "run_started_at=$run_started_at" >> "$GITHUB_OUTPUT"
          # The pinned offload binary auto-discovers offload.toml and does
          # not support --config, so expose this lane's config only for the
          # invocation and restore the canonical file before cache keys run.
          original_offload="$(mktemp)"
          cp offload.toml "$original_offload"
          cp offload-modal-server-mysql.toml offload.toml
          set +e
          stdbuf -oL -eL offload -v run 2>&1 \
            | tee "$offload_log" \
            | stdbuf -oL grep -v 'No historical duration for test'
          exit_code="${PIPESTATUS[0]}"
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          # Classification decides whether the recorded exit code is an
          # infrastructure failure, a test failure, or a cache-safe success.
      - name: Classify offload result
        id: classify
        if: always()
        env:
          OFFLOAD_EXIT_CODE: ${{ steps.run.outputs.exit_code }}
          RUN_STARTED_AT: ${{ steps.run.outputs.run_started_at }}
          SETUP_PYTHON_OUTCOME: ${{ steps.setup_python.outcome }}
          INSTALL_RUST_OUTCOME: ${{ steps.install_rust.outcome }}
          PREPARE_OUTCOME: ${{ steps.prepare.outcome }}
          PROVISION_OUTCOME: ${{ steps.provision.outcome }}
        run: |
          set -euo pipefail
          echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"
          trap 'echo "ended_at=$(date +%s)" >> "$GITHUB_OUTPUT"' EXIT
          python scripts/ci/classify_offload_result.py \
            --lane modal-server-rest-mysql-ci \
            --infra-policy fail \
            --junit-file test-results/modal-server-rest-mysql-ci/junit.xml \
            --offload-log test-results/modal-server-rest-mysql-ci/offload.log \
            --exit-code "$OFFLOAD_EXIT_CODE" \
            --run-started-at "$RUN_STARTED_AT" \
            --setup-python-outcome "$SETUP_PYTHON_OUTCOME" \
            --install-rust-outcome "$INSTALL_RUST_OUTCOME" \
            --prepare-outcome "$PREPARE_OUTCOME" \
            --provision-outcome "$PROVISION_OUTCOME"
      - name: Teardown Modal server
        id: teardown
        if: always() && steps.provision.outputs.sandbox_id != ''
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          SANDBOX_ID: ${{ steps.provision.outputs.sandbox_id }}
          APP_NAME: ${{ steps.provision.outputs.app_name }}
        run: |
          set -euo pipefail
          echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"
          trap 'echo "ended_at=$(date +%s)" >> "$GITHUB_OUTPUT"' EXIT
          python scripts/ci/provision_modal_server.py teardown \
            --sandbox-id "$SANDBOX_ID" \
            --app-name "$APP_NAME"
      - name: Emit timing manifest
        if: always()
        env:
          CLASSIFICATION: ${{ steps.classify.outputs.classification }}
          CLASSIFICATION_REASON: ${{ steps.classify.outputs.reason }}
          CLASSIFICATION_DIAGNOSTIC: ${{ steps.classify.outputs.diagnostic }}
          FAILED_PHASE: ${{ steps.classify.outputs.failed_phase }}
          FAILED_TESTS: ${{ steps.classify.outputs.failed_tests }}
          MODAL_INFRA_FAILED: ${{ steps.classify.outputs.modal_infra_failed }}
          TEST_FAILED: ${{ steps.classify.outputs.test_failed }}
          HARNESS_FAILED: ${{ steps.classify.outputs.harness_failed }}
          JUNIT_CACHE_SAFE: ${{ steps.classify.outputs.junit_cache_safe }}
        run: |
          set -euo pipefail
          python scripts/ci/emit_timing_manifest.py \
            --lane modal-server-rest-mysql-ci \
            --output-dir test-results/modal-server-rest-mysql-ci \
            --junit-file test-results/modal-server-rest-mysql-ci/junit.xml \
            --offload-log test-results/modal-server-rest-mysql-ci/offload.log \
            --classification "${CLASSIFICATION:-unknown}" \
            --classification-reason "${CLASSIFICATION_REASON:-unknown}" \
            --classification-diagnostic "${CLASSIFICATION_DIAGNOSTIC:-}" \
            --failed-phase "${FAILED_PHASE:-none}" \
            --failed-tests "${FAILED_TESTS:-[]}" \
            --modal-infra-failed "${MODAL_INFRA_FAILED:-}" \
            --test-failed "${TEST_FAILED:-}" \
            --harness-failed "${HARNESS_FAILED:-}" \
            --junit-cache-safe "${JUNIT_CACHE_SAFE:-}" \
            --phase "modal_prepare=${{ steps.prepare.outputs.started_at }},${{ steps.prepare.outputs.ended_at }},${{ steps.prepare.outcome }}" \
            --phase "server_provision=${{ steps.provision.outputs.started_at }},${{ steps.provision.outputs.ended_at }},${{ steps.provision.outcome }}" \
            --phase "test_execution=${{ steps.run.outputs.started_at }},${{ steps.run.outputs.ended_at }},exit_${{ steps.run.outputs.exit_code || 'missing' }}" \
            --phase "classification=${{ steps.classify.outputs.started_at }},${{ steps.classify.outputs.ended_at }},${{ steps.classify.outcome }}" \
            --phase "teardown=${{ steps.teardown.outputs.started_at }},${{ steps.teardown.outputs.ended_at }},${{ steps.teardown.outcome }}"
      - name: Save offload image cache
        if: always()
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: .offload-image-cache
          key: offload-image-v2-${{ runner.os }}-${{ inputs.python-version }}-${{
            hashFiles('Dockerfile.ci', '.dockerignore', 'pyproject.toml', 'scripts/install-zenml-dev.sh',
            'offload.toml', 'offload-modal-server-mysql.toml') }}
      - name: Save JUnit duration cache
        if: ${{ always() && steps.classify.outputs.junit_cache_safe == 'true' }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: test-results/modal-server-rest-mysql-ci/junit.xml
          key: offload-modal-server-rest-mysql-ci-junit-${{ runner.os }}-${{ inputs.python-version
            }}-${{ github.run_id }}
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: modal-server-rest-mysql-ci
          path: test-results/modal-server-rest-mysql-ci/**
          if-no-files-found: warn
      - name: Exit with classified status
        if: always()
        env:
          MODAL_INFRA_FAILED: ${{ steps.classify.outputs.modal_infra_failed }}
          TEST_FAILED: ${{ steps.classify.outputs.test_failed }}
        run: |-
          if [[ "$MODAL_INFRA_FAILED" == "true" ]]; then
            exit 1
          fi
          if [[ "$TEST_FAILED" == "true" ]]; then
            exit 1
          fi
