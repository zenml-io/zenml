[offload]
max_parallel = 30
test_timeout_secs = 960
# Cap on cumulative historical duration per batch (LPT bin-packing).
# 10s (the offload default) over-fragments large suites into many small
# batches, each paying the per-batch sandbox-exec + junit-download
# overhead. 60s amortizes that overhead while keeping single batches
# short enough to retry quickly. Tests whose own duration already
# exceeds 60s continue to be placed alone in their own batch.
max_batch_duration_secs = 60
sandbox_project_root = "/app"

[provider]
type = "default"
prepare_command = "uv run @modal_sandbox.py prepare Dockerfile.ci --cached --include-cwd --sandbox-init-cmd 'cd /app && pip install --no-deps -e . -q'"
create_command = "uv run @modal_sandbox.py create {image_id} --cpu 8 --memory-gb 16 --env COVERAGE_CORE=sysmon --env PYTHONDONTWRITEBYTECODE=1 --env PYTHONUNBUFFERED=1 --env ZENML_DEBUG=true --env ZENML_ANALYTICS_OPT_IN=false --env AUTO_OPEN_DASHBOARD=false"
exec_command = "uv run @modal_sandbox.py exec {sandbox_id} {command}"
destroy_command = "uv run @modal_sandbox.py destroy {sandbox_id}"
download_command = "uv run @modal_sandbox.py download {sandbox_id} {paths}"
timeout_secs = 960

[framework]
type = "pytest"
paths = []
command = "python -m pytest -p no:pytest_postgresql"
run_args = "--no-provision --environment default -p no:randomly -p no:rerunfailures"

[groups.unit]
retry_count = 0
filters = "tests/unit"

[groups.integration]
# offload retries are speculative-parallel: retry_count=N creates
# (N+1) test instances at scheduling time and runs them all in
# parallel, doubling sandbox-seconds for the entire group regardless
# of whether anything actually fails. Keep this at 0 and rely on
# pytest-rerunfailures (or post-hoc CI rerun) for true flakes.
retry_count = 0
# pyproject.toml has `norecursedirs = ["tests/integration/examples/*"]`
# which silently does nothing — pytest matches norecursedirs against
# directory basenames, not glob paths, so example tests still get
# collected. The heavy ones (test_scipy, test_sklearn) take 60-66s
# each, and they aren't supposed to run in fast CI (they're a
# regression suite for the example pipelines). Exclude here so we
# don't have to risk touching pyproject.toml.
filters = "tests/integration --ignore=tests/integration/examples -m 'not slow'"

[report]
output_dir = "test-results/modal-fast-ci"
