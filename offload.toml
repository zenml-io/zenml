[offload]
max_parallel = 30
test_timeout_secs = 960
sandbox_project_root = "/app"

[provider]
type = "modal"
dockerfile = "Dockerfile.ci"
include_cwd = true
cpu_cores = 4.0

[provider.env]
COVERAGE_CORE = "sysmon"
PYTHONDONTWRITEBYTECODE = "1"
PYTHONUNBUFFERED = "1"
ZENML_DEBUG = "true"
ZENML_ANALYTICS_OPT_IN = "false"
AUTO_OPEN_DASHBOARD = "false"

[framework]
type = "pytest"
paths = ["tests/unit", "tests/integration"]
command = "python -m pytest"
run_args = "--no-provision --environment default -p no:randomly -p no:rerunfailures"

[groups.unit]
retry_count = 0
filters = "tests/unit"

[groups.integration]
retry_count = 1
filters = "tests/integration -m 'not slow'"

[report]
output_dir = "test-results/modal-fast-ci"
