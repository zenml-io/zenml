[offload]
max_parallel = 32
test_timeout_secs = 600
sandbox_project_root = "/app"
sandbox_init_cmd = "scripts/install-zenml-dev.sh --system --integrations yes"

[provider]
type = "modal"
dockerfile = "docker/offload-test.Dockerfile"
include_cwd = true

[framework]
type = "pytest"
paths = ["tests/unit", "tests/integration"]
command = "python -m pytest"
run_args = "--color=yes -vv --no-provision --environment default"

[groups.default]
retry_count = 2
filters = "--continue-on-collection-errors"

[report]
output_dir = "test-results"
