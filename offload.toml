[offload]
max_parallel = 20
test_timeout_secs = 960
max_batch_duration_secs = 320
sandbox_project_root = "/app"

[provider]
type = "default"
prepare_command = "uv run --exclude-newer \"PT72H\" @modal_sandbox.py prepare Dockerfile.ci --cached --include-cwd --sandbox-init-cmd 'cd /app && pip install --no-deps -e . -q'"
create_command = "uv run --exclude-newer \"PT72H\" @modal_sandbox.py create {image_id} --cpu 4 --memory-gb 8 --env PYTHONDONTWRITEBYTECODE=1 --env PYTHONUNBUFFERED=1 --env ZENML_DEBUG=true --env ZENML_ANALYTICS_OPT_IN=false --env AUTO_OPEN_DASHBOARD=false --env ZENML_CUSTOM_SOURCE_ROOT=/app"
exec_command = "python3 @modal_sandbox.py exec {sandbox_id} {command}"
destroy_command = "uv run --exclude-newer \"PT72H\" @modal_sandbox.py destroy {sandbox_id}"
download_command = "printf '[offload] exec_and_fetch returned no inline artifacts; falling back to download_command.\\n' >&2; python3 @modal_sandbox.py download {sandbox_id} {paths}"
exec_and_fetch_command = "python3 @modal_sandbox.py exec-and-fetch {sandbox_id} {command} --fetch {fetch}"
timeout_secs = 960

[framework]
type = "pytest"
paths = []
command = "python -m pytest -p no:pytest_postgresql"
run_args = "--no-provision --environment default -p no:randomly -p no:rerunfailures"

[groups.unit]
retry_count = 0
# These timing-sensitive dynamic pipeline tests are covered by a separate serial GitHub-runner job.
filters = "tests/unit --deselect=tests/unit/execution/pipeline/dynamic/test_child_pipelines.py::test_wait_abort_aborts_run --deselect=tests/unit/execution/pipeline/dynamic/test_child_pipelines.py::test_parent_waits_while_child_runs_then_wait_resolves"

[groups.integration]
retry_count = 0
filters = "tests/integration -m 'not slow'"

[report]
output_dir = ".ci/offload"
