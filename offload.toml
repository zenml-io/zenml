[offload]
max_parallel = 30
test_timeout_secs = 960
# Cap on cumulative historical duration per batch (LPT bin-packing).
# 10s (the offload default) over-fragments large suites into many small
# batches, each paying the per-batch sandbox-exec + junit-download
# overhead. 60s amortizes that overhead while keeping single batches
# short enough to retry quickly. Tests whose own duration already
# exceeds 60s continue to be placed alone in their own batch.
max_batch_duration_secs = 60
sandbox_project_root = "/app"

[provider]
type = "default"
# sandbox_init_cmd runs once during image prep (after include_cwd
# overlays the source over /app) and bakes its result into the
# image, so every sandbox spawned from that image starts with:
#   - zenml installed editable from the freshly-overlaid source
#   - a pre-migrated SQLite template + global config under
#     /opt/zenml-template/, materialized by the build_zenml_template.py
#     helper. The _zenml_client_template pytest fixture honors
#     ZENML_CLIENT_TEMPLATE_DIR (set on every sandbox via the
#     create_command --env flags below) and copies from there
#     instead of paying the ~17s clean_client init cost per batch.
prepare_command = "uv run @modal_sandbox.py prepare Dockerfile.ci --cached --include-cwd --sandbox-init-cmd 'cd /app && pip install --no-deps -e . -q && python scripts/ci/build_zenml_template.py /opt/zenml-template'"
create_command = "uv run @modal_sandbox.py create {image_id} --cpu 8 --memory-gb 16 --env COVERAGE_CORE=sysmon --env PYTHONDONTWRITEBYTECODE=1 --env PYTHONUNBUFFERED=1 --env ZENML_DEBUG=true --env ZENML_ANALYTICS_OPT_IN=false --env AUTO_OPEN_DASHBOARD=false --env ZENML_CLIENT_TEMPLATE_DIR=/opt/zenml-template"
# The high-frequency per-batch commands use system python3 instead of
# `uv run` to skip uv's PEP 723 metadata resolve + virtualenv stat
# dance on every invocation (~1-2s saved per call). Requires the CI
# workflow to pre-install `modal`, `click`, and `dockerfile-parse`
# into the runner's system Python before offload is executed. The
# one-off prepare/create/destroy commands stay on `uv run` so the
# env isolation is preserved where it matters.
#
# exec_and_fetch_command is the fused fast path: runs pytest AND
# fetches the junit.xml in a single Python process (one Modal SDK
# import + Sandbox.from_id round-trip instead of two). See
# safoinme/offload feat/max-batch-duration for the supporting
# Sandbox trait method. exec_command + download_command remain as
# the safety fallback if the sandbox returns Ok(None).
exec_command = "python3 @modal_sandbox.py exec {sandbox_id} {command}"
destroy_command = "uv run @modal_sandbox.py destroy {sandbox_id}"
download_command = "python3 @modal_sandbox.py download {sandbox_id} {paths}"
exec_and_fetch_command = "python3 @modal_sandbox.py exec-and-fetch {sandbox_id} {command} --fetch {fetch}"
timeout_secs = 960

[framework]
type = "pytest"
paths = []
command = "python -m pytest -p no:pytest_postgresql"
run_args = "--no-provision --environment default -p no:randomly -p no:rerunfailures"

[groups.unit]
retry_count = 0
filters = "tests/unit"

[groups.integration]
# offload retries are speculative-parallel: retry_count=N creates
# (N+1) test instances at scheduling time and runs them all in
# parallel, doubling sandbox-seconds for the entire group regardless
# of whether anything actually fails. Keep this at 0 and rely on
# pytest-rerunfailures (or post-hoc CI rerun) for true flakes.
retry_count = 0
# Keep the fast path close to the existing integration coverage and
# exclude only tests that are explicitly marked slow. Example tests
# are excluded because `.dockerignore` strips `examples/` from the
# Modal sandbox image — anything under `tests/integration/examples/`
# would try to `copytree` from `/app/examples/<name>` and fail with
# FileNotFoundError. The example suite is a heavier regression run
# that isn't part of fast CI anyway.
filters = "tests/integration --ignore=tests/integration/examples -m 'not slow'"

[report]
output_dir = "test-results/modal-fast-ci"
