# Use this docker compose file to run a ZenML OSS server on your local machine.
# This will start:
# - the ZenML Server API - available at http://localhost:8080
# - the ZenML Dashboard (Vite dev server) - available at http://localhost:3001 (username: default, password: empty)
# - the MySQL database - available at mysql://root:password@127.0.0.1:3306
# - Grafana + OTel LGTM stack - Grafana at http://localhost:3002 (username: admin, password: admin)
#
# This is useful for local development and testing of the ZenML server.
#
# PREREQUISITES:
#   The dashboard source is expected at ../zenml-dashboard (sibling to this repo). Clone it with:
#
#     git clone https://github.com/zenml-io/zenml-dashboard.git ../zenml-dashboard
#
# Some useful commands:
# - start the stack interactively:
#
#     docker compose up
#
# - start the stack in detached mode:
#
#     docker compose up -d
#
# - tear down the stack:
#
#     docker compose down
#
# - tear down the stack and remove the volumes:
#
#     docker compose down -v
#
# - restart the server after rebuilding it:
#
#     docker compose up --build --force-recreate zenml_server
#
# - view the logs:
#
#     docker compose logs -f
#
# - get a bash into the ZenML Server container:
#
#     docker compose exec zenml_server bash
#
# Once the stack is up:
# - Open the dashboard at http://localhost:3001
# - Connect a ZenML client:
#
#     zenml logout            # clear any stale tokens first
#     zenml login http://localhost:8080
#
# The server auto-activates with a default admin account (empty password).

services:
  database:
    image: mysql:8
    container_name: zenml-database
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  otel_lgtm:
    image: grafana/otel-lgtm:latest
    container_name: zenml-otel-lgtm
    ports:
      - 3002:3000 # Grafana UI
      - 4317:4317 # OTLP gRPC
      - 4318:4318 # OTLP HTTP
    environment:
      - ENABLE_OBI=true
      - OBI_TARGET=python
      # - ENABLE_LOGS_ALL=true
    volumes:
      - otel_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cat /tmp/ready"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  zenml_server:
    # To use the official published image instead of building from source,
    # uncomment the `image` line and comment out the `build` section.
    #
    # image: zenmldocker/zenml-server:latest
    build:
      context: ./
      dockerfile: docker/zenml-server-dev.Dockerfile
      args:
        INSTALL_DEBUG_TOOLS: true
      # Use local-runtime to run in dev mode with hot-reload from mounted
      # source code. Remove this target to bake sources into the image instead.
      target: local-runtime
    container_name: zenml-server
    platform: linux/amd64
    ports:
      - 8080:8080
    volumes:
      - ./src:/zenml/src
    depends_on:
      database:
        condition: service_healthy
      otel_lgtm:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import requests; requests.get('http://localhost:8080/health').raise_for_status()",
        ]
      interval: 10s
      timeout: 10s
      retries: 3
    restart: on-failure
    environment:
      ZENML_LOGGING_VERBOSITY: DEBUG
      ZENML_ANALYTICS_OPT_IN: false
      ZENML_DEFAULT_PROJECT_NAME: default

      ZENML_SERVER_DEPLOYMENT_TYPE: docker
      ZENML_SERVER_SERVER_URL: http://localhost:8080
      ZENML_SERVER_DASHBOARD_URL: http://localhost:3001
      ZENML_SERVER_AUTO_ACTIVATE: true
      ZENML_SERVER_JWT_SECRET_KEY: dummy_zenml_server_jwt_secret_key
      ZENML_SERVER_RATE_LIMIT_ENABLED: true
      ZENML_SERVER_LOGIN_RATE_LIMIT_MINUTE: 100

      ZENML_STORE_TYPE: sql
      ZENML_STORE_URL: mysql://root@database/zenml
      ZENML_STORE_PASSWORD: password

      ZENML_SECRETS_STORE_TYPE: sql
      ZENML_SECRETS_STORE_ENCRYPTION_KEY: dummy_zenml_secrets_store_encryption_key

      # OpenTelemetry configuration
      OTEL_SERVICE_NAME: zenml-server
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel_lgtm:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      # OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED: true
      OTEL_PYTHON_LOG_LEVEL: debug

  zenml_dashboard:
    image: node:22-slim
    container_name: zenml-dashboard
    working_dir: /app
    ports:
      - 3001:3001
    volumes:
      - ../zenml-dashboard:/app
      - dashboard_node_modules:/app/node_modules
    depends_on:
      zenml_server:
        condition: service_healthy
    command: >
      /bin/sh -c "
      corepack enable &&
      corepack prepare pnpm@latest --activate &&
      pnpm install --frozen-lockfile &&
      pnpm approve-builds --global @swc/core esbuild &&
      pnpm install --frozen-lockfile &&
      pnpm dev --host 0.0.0.0 --port 3001"
    restart: on-failure
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1

volumes:
  mysql_data:
  otel_data:
  dashboard_node_modules:
