# ZenML-native configuration for Optuna sweep pipeline
#
# Use with: sweep_pipeline.with_options(config_path="conf/config_zenml.yaml")()
# Or CLI: zenml pipeline run pipelines.sweep:sweep_pipeline -c conf/config_zenml.yaml
#
# Override from code: parameters passed to pipeline() take precedence over this file

# Pipeline-level flags
enable_cache: true
enable_step_logs: true

# Run naming - use placeholders for uniqueness across runs
run_name: "fashion_mnist_sweep_{date}_{time}"

# Pipeline parameters (sweep_pipeline arguments)
parameters:
  study_name: fashion_mnist_sweep
  storage_url: "sqlite:///optuna_study.db"
  n_trials: 5
  max_iter: 10

  # Search space for Optuna hyperparameter optimization
  search_space:
    learning_rate:
      low: 1.0e-4
      high: 0.01
      log: true
    batch_size:
      choices: [64, 128]
    hidden_dim:
      choices: [8, 16, 32]

# Docker settings for step execution
settings:
  docker:
    requirements: "requirements.txt"
    python_package_installer: "uv"
    build_config:
      build_options:
        platform: linux/amd64

