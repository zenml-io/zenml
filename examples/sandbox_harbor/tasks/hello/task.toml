# flavor's default image (Modal: python:3.11-slim). Set
# `docker_image = "..."` here only when a task needs to pin a specific
# registry image regardless of flavor. The `environment/` directory
# holds only a .gitkeep: Harbor requires the directory to exist for
# task discovery, but the bridge never builds from it.

