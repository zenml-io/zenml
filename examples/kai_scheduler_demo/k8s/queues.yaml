# KAI-Scheduler Queue CRDs for the ZenML + KAI demo.
#
# Queue hierarchy (sized for 2 × T4 GPU nodes, ~15 GB RAM / 4 CPU each):
#
#   root-queue  (2 GPUs total)
#     ├── default-queue  (quota=1 GPU — regular train/build jobs)
#     └── prod-queue     (quota=1 GPU — high-priority jobs, 2× over-quota weight)
#
# With 2 GPUs:
#   - Both queues run simultaneously (1 GPU each at quota).
#   - If one queue is idle, the other can burst to 2 GPUs (over-quota).
#   - A train-high job in prod-queue will preempt a train job in default-queue.
#
# Memory is in MiB. ~6 GB per node reserved for system + GPU operator pods.
#
# Usage:
#   kubectl apply -f k8s/queues.yaml
#
# Verify queue creation:
#   kubectl get queues.scheduling.run.ai
#
# Reference: https://docs.run.ai/latest/Researcher/scheduling/the-runai-scheduler/
---
apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: root-queue
spec:
  displayName: "Root Queue"
  resources:
    gpu:
      quota: 2
      limit: -1
      overQuotaWeight: 1
    cpu:
      quota: 6000
      limit: -1
      overQuotaWeight: 1
    memory:
      quota: 18432
      limit: -1
      overQuotaWeight: 1
---
apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: default-queue
spec:
  displayName: "ZenML Default Queue"
  parentQueue: root-queue
  resources:
    gpu:
      quota: 1
      limit: 2
      overQuotaWeight: 1
    cpu:
      quota: 8000
      limit: 16000
      overQuotaWeight: 1
    memory:
      quota: 9216
      limit: 18432
      overQuotaWeight: 1
---
apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: prod-queue
spec:
  displayName: "ZenML Production Queue"
  parentQueue: root-queue
  resources:
    gpu:
      quota: 1
      limit: 2
      overQuotaWeight: 2
    cpu:
      quota: 3000
      limit: 6000
      overQuotaWeight: 2
    memory:
      quota: 9216
      limit: 18432
      overQuotaWeight: 2
