# ZenML pipeline config: GPU time-slicing (fractional GPU) via KAI-Scheduler.
#
# This config demonstrates KAI-Scheduler's GPU sharing feature. Instead of
# requesting a full nvidia.com/gpu, each pod requests a fraction of a GPU.
# KAI allocates the GPU and enforces the fraction as a time-slice.
#
# Use this when multiple workloads share a single physical GPU to maximise
# hardware utilization across teams.
#
# Prerequisites:
#   1. KAI-Scheduler with GPU sharing enabled in your cluster.
#   2. Queues applied: kubectl apply -f k8s/queues.yaml
#
# Usage:
#   python run.py --config kai_demo_gpu_sharing.yaml

model:
  name: kai-scheduler-gpu-sharing-demo
  tags:
    - kai-scheduler
    - gpu-sharing
    - kubecon-demo

settings:
  docker:
    parent_image: "pytorch/pytorch:2.2.2-cuda11.8-cudnn8-runtime"
    requirements: requirements.txt
    python_package_installer: uv
    python_package_installer_args:
      system: null
    environment:
      FORCE_REBUILD: "1"

  # Pipeline-level: only queue assignment (no GPU settings here,
  # so the orchestrator pod stays on a regular CPU node).
  orchestrator.kubernetes:
    kai_queue: "default-queue"

steps:
  cuda_matrix_benchmark:
    settings:
      orchestrator.kubernetes:
        kai_gpu_fraction: 0.5
        pod_settings:
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
              nvidia.com/gpu: "1"
            limits:
              memory: "4Gi"
              cpu: "1500m"
              nvidia.com/gpu: "1"
          node_selectors:
            cloud.google.com/gke-accelerator: nvidia-tesla-t4
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"

  pytorch_cnn_train:
    settings:
      orchestrator.kubernetes:
        kai_gpu_fraction: 0.5
        pod_settings:
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
              nvidia.com/gpu: "1"
            limits:
              memory: "4Gi"
              cpu: "1500m"
              nvidia.com/gpu: "1"
          node_selectors:
            cloud.google.com/gke-accelerator: nvidia-tesla-t4
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"

parameters:
  matrix_size: 2048
  epochs: 3
  batch_size: 32
  learning_rate: 0.001
