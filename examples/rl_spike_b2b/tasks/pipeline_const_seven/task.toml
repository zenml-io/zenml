schema_version = "1.2"
artifacts = []

[metadata]
description = "Multi-turn recast of the rl_spike const_seven task: write a ZenML dynamic pipeline returning 7, with execute-and-fix turns."
difficulty_level = 1

[verifier]
# The scorer runs the generated pipeline against a throwaway local sqlite
# store; first-run store init dominates (~1 min), so leave headroom.
timeout_sec = 900.0

[verifier.env]

[agent]
timeout_sec = 900.0

[environment]
build_timeout_sec = 300.0
os = "linux"
# network_mode defaults to "public" (Harbor >=0.9; allow_internet is deprecated)
mcp_servers = []
# Both the agent's run_pipeline tool and the verifier execute the generated
# pipeline INSIDE the sandbox, so the image must ship zenml[local]. This is
# the B1 sandbox image (see GPU_SETUP.md part 3); on the Kubernetes sandbox
# flavor it reaches the pod via the spike-only docker_image ->
# KubernetesSandboxSettings.image translation on this branch.
docker_image = "339712793861.dkr.ecr.eu-central-1.amazonaws.com/zenml-rl-spike-sandbox:0.2"

[environment.env]

[solution.env]
