schema_version = "1.2"
artifacts = []

[metadata]
description = "Multi-turn recast of the rl_spike const_seven task: write a ZenML dynamic pipeline returning 7, with execute-and-fix turns."
difficulty_level = 1

[verifier]
# The scorer runs the generated pipeline against a throwaway local sqlite
# store; first-run store init dominates (~1 min), so leave headroom.
timeout_sec = 900.0

[verifier.env]

[agent]
timeout_sec = 900.0

[environment]
build_timeout_sec = 300.0
os = "linux"
# network_mode defaults to "public" (Harbor >=0.9; allow_internet is deprecated)
mcp_servers = []
# Modal variant: no docker_image pin (Modal cannot pull the private ECR
# image) — the component default applies and the snapshot demo pip-installs
# zenml[local] into the session before the fix loop.

[environment.env]

[solution.env]
